name: Build Rust Extensions
description: Build kernel and tasks Python wheels from Rust source (raft is rlib-only since F2 C8 — its PyO3 bindings live in nexus_kernel)

inputs:
  profile:
    description: 'Cargo build profile (dev or release)'
    required: false
    default: 'dev'
  rust-cache-shared-key:
    description: 'Shared key for Swatinem/rust-cache'
    required: false
    default: 'rust-build'
  output-dir:
    description: 'Directory to output built wheels'
    required: false
    default: 'dist'
  github-token:
    description: 'GitHub token for authenticated API calls (avoids rate limits)'
    required: false
    default: ''

outputs:
  wheels-dir:
    description: 'Path to directory containing built wheels'
    value: ${{ inputs.output-dir }}

runs:
  using: composite
  steps:
    - name: Install protoc
      # Needed by the raft-proto v0.7.0 crate's protobuf-build step, which
      # shells out to ``protoc`` directly and cannot reuse the vendored
      # binary our own build.rs wires up for tonic.  Linux runners have a
      # system protoc preinstalled; macOS does not, so every build broke
      # with "No suitable protoc (>= 3.1.0) found in PATH" until this
      # step landed.  The action is idempotent on hosts where protoc is
      # already on PATH.
      uses: arduino/setup-protoc@v3
      with:
        version: "27.x"
        repo-token: ${{ inputs.github-token }}

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "${{ inputs.rust-cache-shared-key }}-${{ runner.os }}"
        workspaces: |
          rust/kernel
          rust/raft
          rust/tasks

    - name: Install maturin
      run: pip install maturin
      shell: bash

    - name: Build Rust extensions
      run: |
        PROFILE_FLAG=""
        if [ "${{ inputs.profile }}" = "release" ]; then
          PROFILE_FLAG="--release"
        fi

        mkdir -p ${{ inputs.output-dir }}
        # F2 C8 (Option A): raft is rlib-only, its PyO3 bindings live in
        # nexus_kernel's cdylib. No standalone _nexus_raft wheel.
        cd rust/kernel && maturin build $PROFILE_FLAG --out ../../${{ inputs.output-dir }} && cd ../..
        cd rust/tasks && maturin build $PROFILE_FLAG --features mimalloc --out ../../${{ inputs.output-dir }} && cd ../..
      shell: bash
