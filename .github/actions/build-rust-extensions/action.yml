name: Build Rust Extensions
description: Build the nexus-cdylib Python wheel from Rust source. The nexus-cdylib build artifact composes kernel + lib + raft + backends + services + transport rlibs into the single `nexus_runtime.so` wheel. raft is rlib-only since F2 C8.

inputs:
  profile:
    description: 'Cargo build profile (dev or release)'
    required: false
    default: 'dev'
  rust-cache-shared-key:
    description: 'Shared key for Swatinem/rust-cache'
    required: false
    default: 'rust-build'
  output-dir:
    description: 'Directory to output built wheels'
    required: false
    default: 'dist'
  github-token:
    description: 'GitHub token for authenticated API calls (avoids rate limits)'
    required: false
    default: ''

outputs:
  wheels-dir:
    description: 'Path to directory containing built wheels'
    value: ${{ inputs.output-dir }}

runs:
  using: composite
  steps:
    - name: Install protoc 3.20.3 (cross-platform)
      # raft-proto v0.7.0's protobuf-build v0.14.1 parses ``protoc --version``
      # as a 3-part semver.  Post-21 protoc releases report 2-part versions
      # ("libprotoc 27.5"), which the parser rejects as "No suitable protoc
      # (>= 3.1.0) found in PATH" even though 27.x is newer than 3.1.
      # Download 3.20.3 where a native asset exists.  Protobuf never shipped
      # a 3.x macOS arm64 asset, so macOS-ARM64 uses grpcio-tools' native
      # bundled compiler with a tiny --version wrapper that keeps
      # protobuf-build on its legacy parser path while all real invocations
      # execute the native compiler.
      run: |
        set -euo pipefail
        if protoc --version 2>/dev/null | grep -qE 'libprotoc 3\.[0-9]+\.[0-9]+'; then
          echo "protoc 3.x already on PATH:"
          protoc --version
          exit 0
        fi
        PROTOC_VERSION="3.20.3"
        USE_GRPC_TOOLS_PROTOC=""
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   ASSET="protoc-3.20.3-linux-x86_64.zip" ;;
          Linux-ARM64) ASSET="protoc-3.20.3-linux-aarch_64.zip" ;;
          macOS-X64)   ASSET="protoc-3.20.3-osx-x86_64.zip" ;;
          macOS-ARM64) USE_GRPC_TOOLS_PROTOC="1" ;;
          *) echo "Unsupported: ${{ runner.os }}-${{ runner.arch }}" && exit 1 ;;
        esac
        TOOL_DIR="${RUNNER_TOOL_CACHE}/protoc/${PROTOC_VERSION}/${{ runner.os }}-${{ runner.arch }}"
        mkdir -p "${TOOL_DIR}"
        if [ -n "${USE_GRPC_TOOLS_PROTOC}" ]; then
          python -m pip install "grpcio-tools>=1.80,<2"
          mkdir -p "${TOOL_DIR}/bin"
          cat > "${TOOL_DIR}/bin/protoc" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail
        if [ "${1:-}" = "--version" ]; then
          echo "libprotoc 3.20.3"
          exit 0
        fi
        exec python -m grpc_tools.protoc "$@"
        EOF
        else
          curl --fail --show-error --silent --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/${ASSET}"
          unzip -q /tmp/protoc.zip -d "${TOOL_DIR}"
        fi
        chmod +x "${TOOL_DIR}/bin/protoc"
        echo "${TOOL_DIR}/bin" >> "${GITHUB_PATH}"
        "${TOOL_DIR}/bin/protoc" --version
      shell: bash

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "${{ inputs.rust-cache-shared-key }}-${{ runner.os }}"
        cache-bin: false
        workspaces: |
          rust/nexus-cdylib
          rust/raft

    - name: Install maturin
      run: pip install maturin
      shell: bash

    - name: Build Rust extensions
      run: |
        PROFILE_FLAG=""
        if [ "${{ inputs.profile }}" = "release" ]; then
          PROFILE_FLAG="--release"
        fi

        mkdir -p ${{ inputs.output-dir }}
        # The wheel-producing crate is `rust/nexus-cdylib/` — kernel is
        # rlib-only.  nexus-cdylib composes kernel + lib + raft +
        # backends + services + transport rlibs into the single
        # `nexus_runtime` wheel; tasks now lives in `rust/services/src/tasks/`
        # and registers its pyclasses through `services::python::register`.
        cd rust/nexus-cdylib && maturin build $PROFILE_FLAG --out ../../${{ inputs.output-dir }} && cd ../..
      shell: bash
