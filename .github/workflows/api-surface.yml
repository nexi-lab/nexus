name: API Surface Check

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Required for third-party PyO3 sdist builds (e.g. pdf-inspector).
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  api-surface-check:
    name: Detect API Breaking Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect API-relevant changes
        id: api-filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'src/nexus/**/*.py'

      - name: Skip when no API-relevant changes
        if: steps.api-filter.outputs.api != 'true'
        run: |
          echo "No src/nexus Python changes detected — skipping API surface check."

      - name: Set up Python
        if: steps.api-filter.outputs.api == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        if: steps.api-filter.outputs.api == 'true'
        run: |
          pip install -e ".[dev]"

      - name: Check if api_versioning module exists
        if: steps.api-filter.outputs.api == 'true'
        id: check-module
        run: |
          if python -c "from nexus.sdk.api_versioning import export_api_surface" 2>/dev/null; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::nexus.sdk.api_versioning not available — skipping API surface check"
          fi

      - name: Export current API surface
        if: steps.api-filter.outputs.api == 'true' && steps.check-module.outputs.available == 'true'
        run: |
          python -c "
          from nexus.sdk.api_versioning import export_api_surface
          from pathlib import Path
          import importlib
          try:
              import nexus.contracts.filesystem as fs_mod
          except ImportError:
              import nexus.core.filesystem as fs_mod
          import nexus.plugins.base as plugin_mod

          count = 0
          count += export_api_surface(fs_mod, Path('/tmp/api-surface-current-filesystem.json'))
          count += export_api_surface(plugin_mod, Path('/tmp/api-surface-current-plugins.json'))
          print(f'Exported {count} API entries from current branch')
          "

      - name: Export base API surface
        if: steps.api-filter.outputs.api == 'true' && steps.check-module.outputs.available == 'true'
        run: |
          PR_SHA=$(git rev-parse HEAD)
          git checkout origin/main -- src/
          python -c "
          from nexus.sdk.api_versioning import export_api_surface
          from pathlib import Path
          try:
              import nexus.contracts.filesystem as fs_mod
          except ImportError:
              import nexus.core.filesystem as fs_mod
          import nexus.plugins.base as plugin_mod

          count = 0
          count += export_api_surface(fs_mod, Path('/tmp/api-surface-base-filesystem.json'))
          count += export_api_surface(plugin_mod, Path('/tmp/api-surface-base-plugins.json'))
          print(f'Exported {count} API entries from main branch')
          " || echo "No base surface available (first run)"
          git checkout "$PR_SHA" -- src/

      - name: Compare API surfaces
        if: steps.api-filter.outputs.api == 'true' && steps.check-module.outputs.available == 'true'
        id: diff
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          from nexus.sdk.api_versioning import load_api_surface, diff_api_surfaces

          breaking = []
          for module in ['filesystem', 'plugins']:
              base_path = Path(f'/tmp/api-surface-base-{module}.json')
              current_path = Path(f'/tmp/api-surface-current-{module}.json')

              if not base_path.exists():
                  print(f'No base surface for {module} (first run)')
                  continue

              old = load_api_surface(base_path)
              new = load_api_surface(current_path)
              diff = diff_api_surfaces(old, new)

              if diff['removed_stable']:
                  for entry in diff['removed_stable']:
                      breaking.append(f'{entry[\"name\"]} (stable since {entry.get(\"since\", \"?\")})')
                      print(f'BREAKING: Removed stable API {entry[\"name\"]}')

              if diff['removed_experimental']:
                  for entry in diff['removed_experimental']:
                      print(f'INFO: Removed experimental API {entry[\"name\"]}')

              if diff['added']:
                  for entry in diff['added']:
                      print(f'INFO: Added API {entry[\"name\"]} ({entry[\"stability\"]})')

          if breaking:
              print(f'\n::error::Breaking changes detected: {len(breaking)} stable APIs removed')
              sys.exit(1)
          else:
              print('No breaking changes detected')
          "

      - name: Comment on PR
        if: failure() && github.event_name == 'pull_request' && steps.api-filter.outputs.api == 'true' && steps.check-module.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## API Surface Check Failed

            Breaking changes detected in stable APIs. Stable APIs (marked with \`@stable_api\`) must not be removed without a deprecation period.

            See the job logs for details on which APIs were affected.

            If this change is intentional, update the API surface baseline.`
            });

  surface-matrix-check:
    name: Enforce API/RPC Surface Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect surface-matrix changes
        id: surface-filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            surface:
              - '.cargo/**'
              - '.github/workflows/api-surface.yml'
              - 'Cargo.*'
              - 'docs/surface-coverage/**'
              - 'docs/benchmarks/**'
              - 'proto/nexus/**'
              - 'pyproject.toml'
              - 'rust/**'
              - 'scripts/gen_api_surface_coverage.py'
              - 'scripts/render_api_surface_coverage.py'
              - 'scripts/surface_coverage/**'
              - 'scripts/validate_api_surface_coverage.py'
              - 'src/nexus/**'
              - 'tests/**'
              - 'uv.lock'

      - name: Skip when no surface-matrix changes
        if: steps.surface-filter.outputs.surface != 'true'
        run: |
          echo "No API/RPC surface-matrix changes detected — skipping matrix enforcement."

      - name: Set up Python
        if: steps.surface-filter.outputs.surface == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install uv
        if: steps.surface-filter.outputs.surface == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        if: steps.surface-filter.outputs.surface == 'true'
        run: uv venv --python 3.14

      - name: Install dependencies
        if: steps.surface-filter.outputs.surface == 'true'
        run: uv pip install -e ".[dev,test]"

      - name: Set up Rust toolchain
        if: steps.surface-filter.outputs.surface == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache nexus-cluster build
        if: steps.surface-filter.outputs.surface == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: api-rpc-surface-matrix

      - name: Build nexusd-cluster for runtime discovery
        if: steps.surface-filter.outputs.surface == 'true'
        run: cargo build --release -p nexus-cluster --bin nexusd-cluster

      - name: Validate API/RPC surface matrix
        if: steps.surface-filter.outputs.surface == 'true'
        run: |
          uv run --no-sync python scripts/validate_api_surface_coverage.py --coverage docs/surface-coverage/api-rpc-surface-coverage.yaml
          uv run --no-sync python -m pytest \
            tests/surface_coverage/test_inventory.py \
            tests/surface_coverage/test_validate.py \
            tests/surface_coverage/test_runtime_discovery.py \
            tests/surface_coverage/test_gap_backlog.py \
            tests/surface_coverage/test_merge.py \
            -v
