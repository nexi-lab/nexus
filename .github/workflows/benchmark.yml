name: Benchmark

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Required for third-party PyO3 sdist builds (e.g. pdf-inspector).
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  benchmark-critical:
    name: Benchmark (Critical Subset)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Smoke test (validate benchmark infrastructure)
        run: |
          uv run pytest tests/benchmarks/test_search_benchmarks.py -k "test_" \
            --benchmark-json=/tmp/smoke.json --benchmark-min-rounds=3 \
            -o "addopts=" -q --co -q 2>/dev/null || true
          echo '{"benchmarks":[]}' > /tmp/smoke.json
          python -c "import json; json.load(open('/tmp/smoke.json'))"

      - name: Run critical benchmarks
        timeout-minutes: 20
        run: |
          uv run pytest tests/benchmarks/ -m benchmark_ci \
            --benchmark-json=benchmark-results.json \
            --benchmark-min-rounds=5 \
            --benchmark-max-time=2.0 \
            --benchmark-warmup=on \
            --benchmark-warmup-iterations=1 \
            -o "addopts=" -v

      - name: Ensure gh-pages branch exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUBLISH_REMOTE: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          if git ls-remote --exit-code --heads "$PUBLISH_REMOTE" gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists."
          else
            echo "Creating gh-pages branch..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize gh-pages for benchmark data"
            git push "$PUBLISH_REMOTE" gh-pages
            git checkout "${{ github.sha }}"
          fi

      - name: Clean working tree for branch switch
        run: git checkout -- .

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-results.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "130%"
          comment-on-alert: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
          fail-on-alert: false
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true

  benchmark-full:
    name: Benchmark (Full Suite)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run full benchmark suite
        timeout-minutes: 45
        run: |
          uv run pytest tests/benchmarks/ \
            --benchmark-json=benchmark-results-full.json \
            --benchmark-min-rounds=5 \
            --benchmark-max-time=2.0 \
            --benchmark-warmup=on \
            --benchmark-warmup-iterations=1 \
            -o "addopts=" -v

      - name: Ensure gh-pages branch exists
        env:
          PUBLISH_REMOTE: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          if git ls-remote --exit-code --heads "$PUBLISH_REMOTE" gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists."
          else
            echo "Creating gh-pages branch..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize gh-pages for benchmark data"
            git push "$PUBLISH_REMOTE" gh-pages
            git checkout "${{ github.sha }}"
          fi

      - name: Clean working tree for branch switch
        run: git checkout -- .

      - name: Store full benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-results-full.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench-full
          auto-push: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
