name: Cluster Binary Build (reusable)

# Reusable workflow for building nexusd-cluster across all three platforms.
# Single SSOT for the build matrix + per-platform size gate. Called by:
#   - cluster-binary.yml  (per-PR + develop push)
#   - release.yml         (tagged releases)
#
# Per-platform size budgets are enforced here. The cluster binary's
# sudowork target is ~5 MiB; the Linux budget is currently slack to
# accommodate the kernel + path_local backend pull. macOS arm64 and
# Windows have no published targets yet — bounds are loose-but-finite
# so a sudden 2× regression still trips the gate.

on:
  workflow_call:
    inputs:
      upload_retention_days:
        description: Artifact retention in days
        required: false
        type: number
        default: 14

jobs:
  build:
    name: cluster-binary / ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nexusd-cluster-linux-x86_64
            binary: nexusd-cluster
            # Real measured size on this PR: 10.65 MiB after kernel +
            # slim backends were linked in (was 7.55 MiB before the
            # data-plane work).  TODO: cut back via release-profile LTO
            # + panic=abort + strip; sudowork target is 5 MiB.
            max_size_bytes: 12582912  # 12 MiB
          - os: macos-14
            artifact_name: nexusd-cluster-macos-arm64
            binary: nexusd-cluster
            # Real measured size on this PR: 9.06 MiB.  TODO: same
            # release-profile optimisation work as the Linux entry.
            max_size_bytes: 10485760  # 10 MiB (mach-O arm64 overhead)
          - os: windows-latest
            artifact_name: nexusd-cluster-windows-x86_64
            binary: nexusd-cluster.exe
            max_size_bytes: 10485760  # 10 MiB (PE+import-table overhead)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc (macOS)
        # raft-proto's build script uses `protobuf-build v0.14.1`, which
        # rejects protoc's new calendar-versioned releases (e.g. "libprotoc
        # 34.1") with "No suitable `protoc` (>= 3.1.0) found in PATH". Pin
        # to a late 3.x release — brew's `protobuf` formula ships 34.x
        # and is unusable here. We pick 3.20.2 rather than 3.20.3 because
        # the 3.20.3 GitHub release only published `osx-x86_64.zip`; the
        # arm64 artifact was dropped, so `osx-aarch_64.zip` 404s on
        # macos-14 (Apple Silicon) runners.
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          PROTOC_VERSION=3.20.2
          case "$(uname -m)" in
            arm64) ARCH=aarch_64 ;;
            x86_64) ARCH=x86_64 ;;
            *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          mkdir -p "$HOME/protoc"
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-osx-${ARCH}.zip"
          unzip -o /tmp/protoc.zip -d "$HOME/protoc"
          echo "$HOME/protoc/bin" >> "$GITHUB_PATH"
          "$HOME/protoc/bin/protoc" --version

      - name: Install protoc (Windows)
        # `.cargo/config.toml`'s PROTOC override points at
        # `scripts/protoc-compat.py` (a shebang-based python script).
        # Linux/macOS runners honour shebangs; Windows does not — it
        # tries to invoke the .py file as a Win32 binary and fails
        # with `os error 193`.  Install a real protoc and override
        # the PROTOC env var so cargo's [env] section's
        # `default = false` lets the workflow value win.
        # Pin to 3.20.2 to match the macOS step (protobuf-build 0.14
        # rejects 4.x/calendar-version protoc versions).
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $protocVersion = '3.20.2'
          $protocDir = Join-Path $env:USERPROFILE 'protoc'
          New-Item -ItemType Directory -Force -Path $protocDir | Out-Null
          $zipPath = Join-Path $env:RUNNER_TEMP 'protoc.zip'
          Invoke-WebRequest -UseBasicParsing -Uri `
            "https://github.com/protocolbuffers/protobuf/releases/download/v${protocVersion}/protoc-${protocVersion}-win64.zip" `
            -OutFile $zipPath
          Expand-Archive -Force -Path $zipPath -DestinationPath $protocDir
          $protocBinDir = Join-Path $protocDir 'bin'
          $protocExe = Join-Path $protocBinDir 'protoc.exe'
          # Native Windows paths into GITHUB_ENV / GITHUB_PATH so
          # cargo + prost-build see real `C:\…\protoc.exe` rather
          # than bash's `/c/Users/…` POSIX form.
          Add-Content -Path $env:GITHUB_PATH -Value $protocBinDir
          Add-Content -Path $env:GITHUB_ENV -Value "PROTOC=$protocExe"
          & $protocExe --version

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cluster-binary-${{ matrix.os }}

      - name: Build release binary
        run: cargo build --release -p nexus-cluster --bin nexusd-cluster

      - name: Check binary size
        shell: bash
        env:
          MAX_SIZE_BYTES: ${{ matrix.max_size_bytes }}
          BINARY_PATH: target/release/${{ matrix.binary }}
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "macOS" ]; then
            actual=$(stat -f '%z' "$BINARY_PATH")
          else
            actual=$(stat -c '%s' "$BINARY_PATH")
          fi
          echo "Binary size: $actual bytes (max: $MAX_SIZE_BYTES)"
          if [ "$actual" -gt "$MAX_SIZE_BYTES" ]; then
            echo "::error::nexusd-cluster ${{ matrix.artifact_name }} exceeds size budget ($actual > $MAX_SIZE_BYTES bytes)"
            exit 1
          fi

      - name: Sanity-check --help
        shell: bash
        run: target/release/${{ matrix.binary }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: ${{ inputs.upload_retention_days }}
