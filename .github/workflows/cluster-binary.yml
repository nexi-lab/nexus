name: Cluster Binary

# Builds the standalone nexusd-cluster binary (rust/cluster/) for every
# supported platform, gates on a binary-size budget, and uploads the
# stripped artifacts. Sudowork and any other downstream consumer
# pulls the platform-appropriate binary from the GitHub Release this
# attaches to (or from the per-PR artifact for testing).
#
# The binary itself has zero Python dependency — that's the whole
# point of the Rust cluster runtime — but the build pulls in raft +
# transport + rcgen + tonic, so we keep a per-platform job rather
# than cross-compiling.

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
    paths:
      - 'rust/cluster/**'
      - 'rust/raft/**'
      - 'rust/transport/**'
      - 'rust/contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cluster-binary.yml'
  push:
    branches: [develop, main]
  release:
    types: [published]

permissions:
  contents: write

# Linux artifact — must be ≤ MAX_LINUX_BINARY_BYTES bytes after strip.
# Sudowork target is ~5 MiB; we accept up to 7 MiB (5505024 + headroom)
# because tonic / rustls dep churn can swing the size by ~10%.
env:
  MAX_LINUX_BINARY_BYTES: "7340032"  # 7 MiB

jobs:
  build:
    name: build / ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: nexusd-cluster-linux-x86_64
            binary: nexusd-cluster
          - os: macos-14
            artifact_name: nexusd-cluster-macos-arm64
            binary: nexusd-cluster
          - os: windows-latest
            artifact_name: nexusd-cluster-windows-x86_64
            binary: nexusd-cluster.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cluster-binary-${{ matrix.os }}

      - name: Build release binary
        run: cargo build --release -p nexus-cluster --bin nexusd-cluster

      # Linux gets the strict size gate. macOS / Windows produce a
      # different on-disk format (Mach-O / PE) where strip helps less,
      # so they only enforce build success.
      - name: Check binary size (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          path="target/release/${{ matrix.binary }}"
          actual=$(stat -c '%s' "$path")
          echo "Binary size: $actual bytes (max: ${MAX_LINUX_BINARY_BYTES})"
          if [ "$actual" -gt "${MAX_LINUX_BINARY_BYTES}" ]; then
            echo "::error::nexusd-cluster Linux binary exceeds size budget ($actual > ${MAX_LINUX_BINARY_BYTES} bytes)"
            exit 1
          fi

      - name: Sanity-check --help
        shell: bash
        run: |
          target/release/${{ matrix.binary }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14

  attach-to-release:
    name: Attach binaries to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nexusd-cluster-linux-x86_64/nexusd-cluster
            artifacts/nexusd-cluster-macos-arm64/nexusd-cluster
            artifacts/nexusd-cluster-windows-x86_64/nexusd-cluster.exe
          fail_on_unmatched_files: true
