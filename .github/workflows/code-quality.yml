name: Code Quality Standards

on:
  pull_request:
    branches: [main, develop]
  merge_group:
  push:
    branches: [main, develop, refactor/**]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'rust/kernel/src/**/*.rs'
      - 'scripts/codegen_kernel_abi.py'
      - 'stubs/**/*.pyi'

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether Python files were changed so required checks can skip
  # gracefully on non-Python PRs (e.g. Rust-only changes).
  detect-changes:
    name: Detect Python Changes
    runs-on: ubuntu-latest
    outputs:
      python_changed: ${{ steps.filter.outputs.python_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Python file changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
            CHANGED=$(git diff --name-only "$BASE"..."$HEAD" | grep -E '\.(py|yaml|rs|pyi)$' | grep -E '^(src/|tests/|\.pre-commit|rust/|stubs/|scripts/codegen)' || true)
          else
            CHANGED=$(git diff --name-only HEAD^...HEAD | grep -E '\.(py|rs|pyi)$' | grep -E '^(src/|tests/|rust/|stubs/|scripts/codegen)' || true)
          fi
          if [ -n "$CHANGED" ]; then
            echo "python_changed=true" >> $GITHUB_OUTPUT
            echo "Python files changed:"
            echo "$CHANGED"
          else
            echo "python_changed=false" >> $GITHUB_OUTPUT
            echo "No Python files changed — required checks will pass cleanly"
          fi

  file-size-check:
    name: Check File Size Limits
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better diffs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Check Python file sizes
        run: |
          python .pre-commit-hooks/check_file_size.py $(find src -name '*.py')

      - name: Report violations
        if: failure()
        run: |
          echo "::error::Files exceed 2000 line limit. See job logs for details."

  # Skip-pass job for branch protection when no Python files changed
  file-size-check-skip:
    name: Check File Size Limits
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No Python files changed — skipping file size check"

  type-ignore-check:
    name: Block New Type Ignores
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Check for new type ignore comments
        run: |
          # Get list of changed Python files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=AM origin/main...HEAD | grep '\.py$' || true)
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=AM HEAD^...HEAD | grep '\.py$' || true)
          fi

          if [ -n "$CHANGED_FILES" ]; then
            echo "Checking files: $CHANGED_FILES"
            python .pre-commit-hooks/check_type_ignore.py $CHANGED_FILES
          else
            echo "No Python files changed"
          fi

      - name: Report violations
        if: failure()
        run: |
          echo "::error::New type: ignore comments detected. Fix type errors properly instead."

  # Skip-pass job for branch protection when no Python files changed
  type-ignore-check-skip:
    name: Block New Type Ignores
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No Python files changed — skipping type ignore check"

  code-metrics:
    name: Code Quality Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install radon

      - name: Calculate code metrics
        run: |
          echo "## Code Quality Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Cyclomatic Complexity
          echo "### Cyclomatic Complexity (files with CC > 10)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          radon cc src -a -nb | grep -E "^[A-Z]|F \(" || echo "No files with high complexity" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Maintainability Index
          echo "### Maintainability Index (files with MI < 20)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          radon mi src -nb | grep -E "^[A-Z]|[A-C] \(" || echo "All files maintainable" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          # Line counts
          echo "### Largest Files (top 10)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find src -name '*.py' -exec wc -l {} \; | sort -rn | head -10 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  brick-imports-check:
    name: Brick Import Boundary Check (regex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Check brick imports
        run: |
          python .pre-commit-hooks/check_brick_imports.py

      - name: Report violations
        if: failure()
        run: |
          echo "::error::Brick import boundary violations detected. See NEXUS-LEGO-ARCHITECTURE.md §1.2."

  codegen-sync:
    name: Codegen Sync Check
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Rust toolchain (for rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install ruff
        run: pip install ruff

      - name: Verify codegen outputs are up-to-date
        run: python3 scripts/codegen_kernel_abi.py --check

  # Skip-pass job for branch protection when no Python files changed
  codegen-sync-skip:
    name: Codegen Sync Check
    needs: detect-changes
    if: needs.detect-changes.outputs.python_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No Python files changed — skipping codegen sync check"

  import-linter:
    name: Architecture Boundary Check (import-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install import-linter
          pip install -e .

      - name: Cache import graph
        uses: actions/cache@v4
        with:
          path: .import-linter-cache
          key: import-linter-${{ runner.os }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: |
            import-linter-${{ runner.os }}-

      - name: Run import-linter
        run: |
          lint-imports --cache-dir .import-linter-cache
        env:
          PYTHONPATH: src

      - name: Report violations
        if: failure()
        run: |
          echo "::error::Architecture boundary violations detected. See NEXUS-LEGO-ARCHITECTURE.md."

  type-ignore-baseline:
    name: Track Type Ignore Baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count type ignore comments
        id: count
        run: |
          CURRENT_COUNT=$(grep -r "# type: ignore" src/ --include="*.py" | wc -l | tr -d ' ')
          echo "count=$CURRENT_COUNT" >> $GITHUB_OUTPUT
          echo "Current type: ignore count: $CURRENT_COUNT"

          # Baseline updated for Issue #1213 (569 = 560 + 9 type ignores for mobile search)
          BASELINE=569

          if [ "$CURRENT_COUNT" -gt "$BASELINE" ]; then
            echo "::error::Type ignore count increased from $BASELINE to $CURRENT_COUNT"
            echo "increased=true" >> $GITHUB_OUTPUT
            exit 1
          elif [ "$CURRENT_COUNT" -lt "$BASELINE" ]; then
            echo "::notice::Great! Type ignore count decreased from $BASELINE to $CURRENT_COUNT"
            echo "decreased=true" >> $GITHUB_OUTPUT
          fi

      - name: Update baseline comment
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const count = ${{ steps.count.outputs.count }};
            const baseline = 531;
            const diff = baseline - count;
            const emoji = diff > 0 ? '📉' : (diff < 0 ? '📈' : '➡️');

            const body = `## Type Safety Progress ${emoji}

            **Current:** ${count} type: ignore comments
            **Baseline:** ${baseline} (Phase 3 start)
            **Change:** ${diff > 0 ? '-' : '+'}${Math.abs(diff)}

            ${diff > 0 ? '✅ Progress! Keep eliminating type suppressions!' :
              diff < 0 ? '⚠️  Type suppressions increased. Phase 3 goal is to eliminate all.' :
              'No change in type suppressions.'}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
