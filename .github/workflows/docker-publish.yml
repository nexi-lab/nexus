name: Docker Publish

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: git SHA short)"
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nexus

jobs:
  build-and-push:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For tagged releases: v1.2.3 -> 1.2.3, latest, stable
            type=semver,pattern={{version}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # For main or develop branch pushes: edge
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
            # For manual dispatch: custom tag or SHA
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=sha,prefix=,enable=${{ github.event.inputs.tag == '' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # E2E smoke tests against the edge image (develop only)
  # Starts a Nexus container, runs init, then exercises the permissions demo
  # and build-perf e2e scripts.  Failures block the workflow so issues are
  # caught early.
  # ---------------------------------------------------------------------------
  e2e-edge:
    name: E2E edge smoke tests
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Nexus edge container
        run: |
          # Container runs as nexus (UID 1000) — match host volume ownership
          mkdir -p /tmp/nexus-data && sudo chown -R 1000:1000 /tmp/nexus-data
          docker run -d --name nexus-e2e \
            --network host \
            -e NEXUS_DATABASE_URL=postgresql://postgres:nexus@localhost/nexus \
            -e NEXUS_HOST=0.0.0.0 \
            -e NEXUS_PORT=2026 \
            -e NEXUS_GRPC_PORT=2029 \
            -e NEXUS_GRPC_TLS=false \
            -e NEXUS_PROFILE=full \
            -v /tmp/nexus-data:/app/data \
            ghcr.io/nexi-lab/nexus:edge

          # Wait for server to be ready
          echo "Waiting for Nexus to start..."
          for i in $(seq 1 180); do
            if ! docker ps --format '{{.Names}}' | grep -qx nexus-e2e; then
              echo "::error::nexus-e2e exited before becoming healthy"
              docker inspect nexus-e2e --format 'exit_code={{.State.ExitCode}} status={{.State.Status}} started_at={{.State.StartedAt}} finished_at={{.State.FinishedAt}} error={{json .State.Error}}' || true
              echo "Crash signatures from container logs:"
              docker logs nexus-e2e 2>&1 | grep -E -m 20 'Illegal instruction|Traceback|ERROR:|FATAL:|panic|segmentation fault|core dumped' || true
              echo "Last 200 container log lines:"
              docker logs nexus-e2e 2>&1 | tail -200 || true
              exit 1
            fi
            if curl -sf http://localhost:2026/healthz/ready > /dev/null 2>&1; then
              echo "Nexus is ready (${i}s)"
              break
            fi
            sleep 1
          done
          if ! curl -sf http://localhost:2026/healthz/ready > /dev/null 2>&1; then
            echo "::error::nexus-e2e never became healthy within 180 seconds"
            docker inspect nexus-e2e --format 'exit_code={{.State.ExitCode}} status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}} started_at={{.State.StartedAt}} finished_at={{.State.FinishedAt}} error={{json .State.Error}}' || true
            echo "Crash signatures from container logs:"
            docker logs nexus-e2e 2>&1 | grep -E -m 20 'Illegal instruction|Traceback|ERROR:|FATAL:|panic|segmentation fault|core dumped' || true
            echo "Last 200 container log lines:"
            docker logs nexus-e2e 2>&1 | tail -200 || true
            exit 1
          fi

      - name: Initialize and extract credentials
        run: |
          # Run init inside the container where nexus CLI is available
          docker exec nexus-e2e sh -c '
            SKIP_CONFIRM=1 QUIET=1 \
            NEXUS_DATABASE_URL=postgresql://postgres:nexus@localhost/nexus \
            /usr/local/bin/docker-entrypoint.sh nexusd --help >/dev/null 2>&1 || true
          '
          # Create admin API key via the REST API
          ADMIN_KEY=$(curl -sf http://localhost:2026/api/admin/bootstrap 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('api_key',''))" 2>/dev/null || true)
          if [ -z "$ADMIN_KEY" ]; then
            echo "Bootstrap not available, trying default admin key from container..."
            ADMIN_KEY=$(docker exec nexus-e2e cat /app/data/.admin-api-key 2>/dev/null || true)
          fi
          echo "NEXUS_URL=http://localhost:2026" >> "$GITHUB_ENV"
          echo "NEXUS_API_KEY=${ADMIN_KEY}" >> "$GITHUB_ENV"
          echo "Admin key obtained: ${ADMIN_KEY:0:10}..."

      - name: Seed demo workspace
        run: |
          # nexus demo init needs a nexus.yaml — create a minimal one
          docker exec nexus-e2e sh -c "printf 'preset: demo\nserver_url: http://localhost:2026\ndata_dir: /app/data\nports:\n  http: 2026\n  grpc: 2029\n' > /app/nexus.yaml"
          docker exec \
            -w /app \
            -e NEXUS_URL=http://localhost:2026 \
            -e NEXUS_API_KEY="${NEXUS_API_KEY}" \
            -e NEXUS_PROFILE=remote \
            -e NEXUS_GRPC_PORT=2029 \
            -e NEXUS_GRPC_TLS=false \
            nexus-e2e nexus demo init --skip-semantic

      - name: Copy test scripts into container
        run: |
          docker cp permissions_demo_enhanced.sh nexus-e2e:/tmp/
          docker cp scripts/test_build_perf_e2e.py nexus-e2e:/tmp/

      - name: Run permissions demo
        run: |
          docker exec \
            -e NEXUS_URL=http://localhost:2026 \
            -e NEXUS_API_KEY="${NEXUS_API_KEY}" \
            -e NEXUS_PROFILE=remote \
            nexus-e2e bash /tmp/permissions_demo_enhanced.sh

      - name: Run build perf e2e
        run: |
          docker exec \
            -e NEXUS_URL=http://localhost:2026 \
            -e NEXUS_API_KEY="${NEXUS_API_KEY}" \
            -e NEXUS_PROFILE=remote \
            -e NEXUS_GRPC_PORT=2029 \
            nexus-e2e python3 /tmp/test_build_perf_e2e.py

      - name: Collect container logs on failure
        if: failure()
        run: |
          docker inspect nexus-e2e --format 'exit_code={{.State.ExitCode}} status={{.State.Status}} health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}} started_at={{.State.StartedAt}} finished_at={{.State.FinishedAt}} error={{json .State.Error}}' || true
          echo "Crash signatures from container logs:"
          docker logs nexus-e2e 2>&1 | grep -E -m 20 'Illegal instruction|Traceback|ERROR:|FATAL:|panic|segmentation fault|core dumped' || true
          echo "Last 200 container log lines:"
          docker logs nexus-e2e 2>&1 | tail -200 || true

      - name: Cleanup
        if: always()
        run: docker rm -f nexus-e2e 2>/dev/null || true

  build-zoekt:
    name: Build & push multi-arch zoekt image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-zoekt
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}
            type=sha,prefix=,enable=${{ github.event.inputs.tag == '' }}

      - name: Build and push multi-arch zoekt image
        uses: docker/build-push-action@v6
        with:
          context: ./dockerfiles
          file: ./dockerfiles/Dockerfile.zoekt
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
