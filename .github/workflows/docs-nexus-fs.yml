name: "nexus-fs docs"

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/nexus-fs/docs/**"
      - "packages/nexus-fs/mkdocs.yml"
      - "packages/nexus-fs/scripts/**"
      - "src/nexus/fs/**"
  pull_request:
    paths:
      - "packages/nexus-fs/docs/**"
      - "packages/nexus-fs/mkdocs.yml"
      - "packages/nexus-fs/scripts/**"
      - "src/nexus/fs/**"

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    working-directory: packages/nexus-fs

env:
  DISABLE_MKDOCS_2_WARNING: "true"

jobs:
  check:
    name: Build & test docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git-revision-date plugin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

      - name: Spell check
        run: typos docs/

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: nexus-fs-docs
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: packages/nexus-fs
        run: pip install -r requirements-docs.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy versioned docs
        working-directory: packages/nexus-fs
        run: |
          mike deploy --push --update-aliases 0.1.0 latest
          mike set-default --push latest

  link-check:
    name: Check external links
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: "packages/nexus-fs/docs/ --exclude-loopback --no-progress"
          fail: true
