name: Documentation

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
          uv pip install -r packages/nexus-fs/requirements-docs.txt

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build documentation
        run: |
          uv run python scripts/build_docs_site.py

      - name: Render surface-coverage dashboard
        run: |
          uv run python scripts/render_api_surface_coverage.py

      - name: Stage surface-coverage under site/
        run: |
          mkdir -p site/surface-coverage
          cp docs/surface-coverage/api-rpc-surface-coverage.html site/surface-coverage/
          cp -r docs/surface-coverage/_vendor site/surface-coverage/_vendor

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/develop'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
