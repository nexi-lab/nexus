name: Federation E2E

# Runs `tests/e2e/docker/test_federation_e2e.py` against the dynamic
# federation cluster in `dockerfiles/docker-compose.dynamic-federation-test.yml`.
# Goal: catch federation regressions (cross-node read pipeline, raft
# leader election, last_writer_address attribution, lock replication)
# at PR time. Mark this check required in branch protection once the
# first ~10 runs are stable.
#
# Why this is a separate workflow (vs docker-integration.yml):
#   docker-integration.yml is disabled per #1720 and exercises a much
#   broader matrix (mounts, MCP, skills, postgres, …). Re-enabling all
#   of it is its own scope. This workflow targets the federation
#   surface only — small, fast, deterministic.

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'Dockerfile'
      - 'dockerfiles/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pyproject.toml'
      - 'rust/**'
      - 'proto/**'
      # Federation-relevant Python surfaces only — avoid spinning up the
      # full Docker matrix for unrelated src/nexus/ changes (e.g. search,
      # rebac, sandbox, tui). The job builds the image from src/nexus
      # via Dockerfile, but the *test* surface only exercises the raft +
      # gRPC + federation handshake paths, so the trigger should match.
      - 'src/nexus/raft/**'
      - 'src/nexus/grpc/**'
      - 'src/nexus/remote/**'
      - 'src/nexus/server/rpc/services/federation_rpc.py'
      - 'src/nexus/server/rpc/services/__init__.py'
      - 'src/nexus/cli/commands/federation.py'
      - 'src/nexus/cli/commands/zone.py'
      - 'tests/e2e/docker/test_federation*.py'
      - '.dockerignore'
      - '.github/workflows/federation-e2e.yml'
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  federation-e2e:
    name: Federation E2E (Docker)
    runs-on: ubuntu-latest
    # Cold cache: image build + cluster up + 58 tests is ~12-15 min on
    # 2-vCPU runners. Warm gha cache shaves the rust compile to ~2 min.
    # 30 min upper bound leaves margin for slow-building dependencies.
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect federation-relevant changes
        id: federation_changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --prune origin "${{ github.base_ref }}"
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > /tmp/federation_changed_files.txt
          cat /tmp/federation_changed_files.txt

          # Note: the workflow file itself is intentionally NOT in this regex.
          # Editing federation-e2e.yml on a PR should not force a full Docker
          # cluster build for an unrelated change. Workflow validation runs
          # on the post-merge push to develop via on.push.paths.
          if grep -Eq '^(Dockerfile|dockerfiles/|Cargo\.toml$|Cargo\.lock$|pyproject\.toml$|rust/|proto/|src/nexus/raft/|src/nexus/grpc/|src/nexus/remote/|src/nexus/server/rpc/services/federation_rpc\.py$|src/nexus/server/rpc/services/__init__\.py$|src/nexus/cli/commands/federation\.py$|src/nexus/cli/commands/zone\.py$|tests/e2e/docker/test_federation.*\.py$|\.dockerignore$)' /tmp/federation_changed_files.txt; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip federation E2E
        if: steps.federation_changes.outputs.run != 'true'
        run: |
          echo "No federation-relevant files changed; reporting required check without running Docker federation suite."

      - name: Set up Docker Buildx
        if: steps.federation_changes.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      # Build the main nexus-fullnode image first, with a registry
      # cache. Subsequent compose builds (witness + sse-mock) reuse
      # the same buildx instance.
      - name: Build nexus-fullnode image
        if: steps.federation_changes.outputs.run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: nexus-fullnode:latest
          build-args: |
            NEXUS_PROFILE_EXTRAS=all,performance,monitoring,docker,event-streaming,sentry,pay
          cache-from: type=gha,scope=federation-e2e
          cache-to: type=gha,scope=federation-e2e,mode=max

      - name: Build cluster + sidecar + witness + sse-mock images
        if: steps.federation_changes.outputs.run == 'true'
        run: |
          docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml build \
            nexus-1 nexus-cli witness sse-mock

      - name: Start federation cluster
        if: steps.federation_changes.outputs.run == 'true'
        run: |
          docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml up -d
          docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml ps

      - name: Wait for both nodes healthy
        if: steps.federation_changes.outputs.run == 'true'
        run: |
          deadline=$((SECONDS + 180))
          while [ $SECONDS -lt $deadline ]; do
            if docker exec nexus-dyn-node-1 bash -c 'timeout 1 bash -c "</dev/tcp/localhost/2126" 2>/dev/null' \
            && docker exec nexus-dyn-node-2 bash -c 'timeout 1 bash -c "</dev/tcp/localhost/2126" 2>/dev/null'; then
              echo "Both nodes healthy (gRPC port 2126 reachable) after ${SECONDS}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Timed out waiting for nodes ready (180s)"
          docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml logs --tail=300
          exit 1

      - name: Run federation E2E tests
        if: steps.federation_changes.outputs.run == 'true'
        run: |
          docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml \
            run --rm \
            -e PIP_INDEX_URL=https://pypi.org/simple \
            test

      - name: Dump container logs on failure
        if: failure() && steps.federation_changes.outputs.run == 'true'
        run: |
          for c in nexus-dyn-node-1 nexus-dyn-node-2 nexus-dyn-witness nexus-dyn-cli nexus-dyn-dragonfly nexus-dyn-sse-mock; do
            echo "::group::$c"
            docker logs $c --tail=400 2>&1 || echo "(no logs)"
            echo "::endgroup::"
          done

      - name: Tear down
        if: always() && steps.federation_changes.outputs.run == 'true'
        run: |
          docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml down -v --remove-orphans || true
