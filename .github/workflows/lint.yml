name: Lint

on:
  push:
    branches: [main, develop, SETUP]
  pull_request:
    branches: [main, develop]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"

      - name: Run ruff linting
        run: |
          uv run ruff check .

      - name: Run ruff format check
        run: |
          uv run ruff format --check .

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('src/**/*.py') }}
          restore-keys: mypy-${{ runner.os }}-

      - name: Run mypy type checking
        run: |
          uv run mypy src/nexus

  rust-lint:
    name: Rust Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-lint"
          workspaces: |
            rust/lib
            rust/kernel
            rust/raft
            rust/profiles/cluster

      - name: Check Rust formatting
        run: |
          for crate in lib kernel raft profiles/cluster; do
            echo "::group::fmt $crate"
            cd rust/$crate && cargo fmt --check && cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done

      - name: Run Clippy
        run: |
          for crate in lib kernel; do
            echo "::group::clippy $crate"
            cd rust/$crate && cargo clippy -- -D warnings && cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done
          echo "::group::clippy raft (all-features)"
          cd rust/raft && cargo clippy --all-features -- -D warnings && cd "$GITHUB_WORKSPACE"
          echo "::endgroup::"
          echo "::group::clippy cluster"
          cd rust/profiles/cluster && cargo clippy -- -D warnings && cd "$GITHUB_WORKSPACE"
          echo "::endgroup::"

      - name: Run Rust tests
        run: |
          for crate in lib kernel; do
            echo "::group::test $crate"
            cd rust/$crate && cargo test && cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done
          echo "::group::test raft (all-features)"
          cd rust/raft && cargo test --all-features && cd "$GITHUB_WORKSPACE"
          echo "::endgroup::"
          echo "::group::test cluster"
          cd rust/profiles/cluster && cargo test && cd "$GITHUB_WORKSPACE"
          echo "::endgroup::"

      - name: Verify WASM compilation (lib)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check --target wasm32-unknown-unknown -p lib --no-default-features
