name: Release

# Atomic release pipeline (Issue #2946).
# The GitHub Release (the user-visible "this version exists" signal) is only
# created AFTER both PyPI publish AND Docker publish succeed.
# PyPI publish is irreversible, but without a GitHub Release users won't
# discover the version via the releases page or release notifications.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PKG_VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          RUST_PKG_VERSION=$(grep '^version = ' rust/kernel/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          RUST_CARGO_VERSION=$(grep '^version = ' rust/kernel/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          API_CLIENT_VERSION=$(node -p "require('./packages/nexus-api-client/package.json').version")
          TUI_VERSION=$(node -p "require('./packages/nexus-tui/package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          echo "Rust package version: $RUST_PKG_VERSION"
          echo "Rust Cargo version: $RUST_CARGO_VERSION"
          echo "API client version: $API_CLIENT_VERSION"
          echo "TUI version: $TUI_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ] || [ "$TAG_VERSION" != "$RUST_PKG_VERSION" ] || [ "$TAG_VERSION" != "$RUST_CARGO_VERSION" ] || [ "$TAG_VERSION" != "$API_CLIENT_VERSION" ] || [ "$TAG_VERSION" != "$TUI_VERSION" ]; then
            echo "❌ Version mismatch! Tag is v$TAG_VERSION but package metadata is inconsistent"
            exit 1
          fi
          echo "✅ Version match confirmed"

  build-wheel:
    needs: [verify-version]
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    needs: [verify-version]
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-rust-wheel:
    needs: [verify-version]
    name: Build nexus-kernel wheel (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-14, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-rust-${{ matrix.os }}
          workspaces: |
            rust/kernel

      - name: Build nexus-kernel wheel
        run: |
          python -m pip install maturin
          maturin build --release --compatibility off --manifest-path rust/kernel/Cargo.toml --interpreter python --out dist

      - name: Upload nexus-kernel wheels
        uses: actions/upload-artifact@v4
        with:
          name: rust-wheel-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  build-rust-sdist:
    needs: [verify-version]
    name: Build nexus-kernel source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-rust-sdist
          workspaces: |
            rust/kernel

      - name: Build nexus-kernel sdist
        run: |
          python -m pip install maturin
          maturin sdist --manifest-path rust/kernel/Cargo.toml --out dist

      - name: Upload nexus-kernel sdist
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-rust:
    name: Publish nexus-kernel to PyPI
    needs: [build-rust-wheel, build-rust-sdist]
    runs-on: ubuntu-latest
    env:
      NEXUS_FAST_PYPI_API_TOKEN: ${{ secrets.NEXUS_FAST_PYPI_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download rust artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-*
          path: artifacts

      - name: Collect nexus-kernel distributions
        run: |
          mkdir -p dist-rust
          cp artifacts/rust-sdist/* dist-rust/ 2>/dev/null || true
          find artifacts -path "*/rust-wheel-*/*.whl" -exec cp {} dist-rust/ \;
          ls -lh dist-rust/

      - name: Skip nexus-kernel PyPI publish
        if: ${{ env.NEXUS_FAST_PYPI_API_TOKEN == '' }}
        run: echo "NEXUS_FAST_PYPI_API_TOKEN not configured; skipping nexus-kernel publish."

      - name: Publish nexus-kernel to PyPI
        if: ${{ env.NEXUS_FAST_PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.NEXUS_FAST_PYPI_API_TOKEN }}
          packages-dir: dist-rust

  publish-pypi:
    name: Publish nexus-ai-fs to PyPI
    needs: [build-wheel, build-sdist, build-rust-wheel, build-rust-sdist]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: artifacts/wheel

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: artifacts/sdist

      - name: Collect nexus-ai-fs distributions
        run: |
          mkdir -p dist-main
          cp artifacts/sdist/* dist-main/ 2>/dev/null || true
          cp artifacts/wheel/* dist-main/ 2>/dev/null || true
          ls -lh dist-main/

      - name: Publish nexus-ai-fs to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist-main

  # ── nexus-fs slim package publish ──────────────────────────────────────
  # Builds and publishes the standalone nexus-fs package alongside nexus-ai-fs.
  # Uses its own pyproject.toml (packages/nexus-fs/) and hatchling build backend.
  # Uses the same PYPI_API_TOKEN as nexus-ai-fs (org-scoped token).
  publish-nexus-fs:
    name: Publish nexus-fs to PyPI
    needs: [verify-version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install build hatchling

      - name: Build nexus-fs wheel and sdist
        run: |
          ln -s ../../src src
          sed -i 's|"../../src/nexus"|"src/nexus"|' pyproject.toml
          python -m hatchling build -d ../../dist-nexus-fs
          git checkout pyproject.toml
          rm -f src
        working-directory: packages/nexus-fs

      - name: Validate wheel
        run: |
          pip install twine check-wheel-contents pydistcheck
          twine check --strict dist-nexus-fs/*
          # W002 (duplicate files) can occur due to symlink resolution in hatchling;
          # log but don't fail — pydistcheck size gate catches bloated wheels.
          check-wheel-contents dist-nexus-fs/*.whl || echo "::warning::check-wheel-contents found issues (non-fatal)"
          pydistcheck --max-allowed-size-compressed '5M' --ignore 'mixed-file-extensions' dist-nexus-fs/*.whl

      - name: Smoke test — install in clean environment
        run: |
          python -m venv /tmp/nexus-fs-release-test
          /tmp/nexus-fs-release-test/bin/pip install dist-nexus-fs/*.whl
          /tmp/nexus-fs-release-test/bin/python -c "import nexus.fs; print(f'nexus-fs v{nexus.fs.__version__}')"
          /tmp/nexus-fs-release-test/bin/nexus-fs --help

      - name: Detect existing nexus-fs PyPI version
        id: nexus-fs-pypi
        run: |
          NEXUS_FS_VERSION=$(grep '^version = ' packages/nexus-fs/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$NEXUS_FS_VERSION" >> "$GITHUB_OUTPUT"
          export NEXUS_FS_VERSION
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["NEXUS_FS_VERSION"]
          url = "https://pypi.org/pypi/nexus-fs/json"
          exists = False

          try:
              with urllib.request.urlopen(url) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              exists = version in payload.get("releases", {})

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"exists={'true' if exists else 'false'}\n")
          print(f"nexus-fs version {version} exists on PyPI: {exists}")
          PY

      - name: Skip nexus-fs PyPI publish
        if: ${{ steps.nexus-fs-pypi.outputs.exists == 'true' }}
        run: echo "nexus-fs v${{ steps.nexus-fs-pypi.outputs.version }} already exists on PyPI; skipping publish."

      - name: Publish nexus-fs to PyPI
        if: ${{ steps.nexus-fs-pypi.outputs.exists != 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist-nexus-fs

      - name: Upload nexus-fs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-fs-dist
          path: dist-nexus-fs/*
          retention-days: 90

  publish-ts-packages:
    name: Publish TypeScript packages to npm
    needs: [verify-version]
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip when NPM token is not configured
        if: ${{ env.NODE_AUTH_TOKEN == '' }}
        run: echo "NPM_TOKEN not configured; skipping TypeScript package publish."

      - name: Set up Node
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Bun
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build and test api-client
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        working-directory: packages/nexus-api-client
        run: |
          npm install
          npm run build
          npm test

      - name: Publish @nexus-ai-fs/api-client
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: |
          VERSION="$(node -p "require('./packages/nexus-api-client/package.json').version")"
          if npm view "@nexus-ai-fs/api-client@${VERSION}" version >/dev/null 2>&1; then
            echo "@nexus-ai-fs/api-client@${VERSION} already published"
          else
            cd packages/nexus-api-client
            npm publish --access public
          fi

      - name: Test TUI
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        working-directory: packages/nexus-tui
        run: |
          bun install
          bun test

      - name: Prepare TUI manifest for publish
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: |
          API_VERSION="$(node -p "require('./packages/nexus-api-client/package.json').version")"
          API_VERSION="$API_VERSION" node <<'EOF'
          const fs = require("fs");
          const path = "packages/nexus-tui/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.dependencies["@nexus-ai-fs/api-client"] = `^${process.env.API_VERSION}`;
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          EOF

      - name: Publish @nexus-ai-fs/tui
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: |
          VERSION="$(node -p "require('./packages/nexus-tui/package.json').version")"
          if npm view "@nexus-ai-fs/tui@${VERSION}" version >/dev/null 2>&1; then
            echo "@nexus-ai-fs/tui@${VERSION} already published"
          else
            cd packages/nexus-tui
            npm publish --access public
          fi

  # Docker build, smoke test, and GHCR push — inline in release.yml so
  # create-release can depend on it directly (Issue #2946 atomic release).
  # docker-publish.yml handles branch pushes (develop/main) separately.
  build-docker:
    name: Build & push Docker (${{ matrix.variant }})
    needs: [verify-version]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - variant: cpu
            suffix: ""
          - variant: cuda
            suffix: "-cuda"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: The March 13, 2026 v0.9.2 "denied: write_package" failure was caused
      # by the GHCR package not being linked to the repo. Fixed by deleting the
      # orphaned package — next push auto-creates it with correct repo linkage.
      # If this recurs: GitHub Settings → Packages → nexus → Manage Actions access.

      - name: Extract version metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          SUFFIX="${{ matrix.suffix }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=ghcr.io/nexi-lab/nexus:${VERSION}${SUFFIX},ghcr.io/nexi-lab/nexus:stable${SUFFIX},ghcr.io/nexi-lab/nexus:latest${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Build image (local load for smoke tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/nexi-lab/nexus:smoke-test
          build-args: TORCH_VARIANT=${{ matrix.variant }}
          cache-from: type=registry,ref=ghcr.io/nexi-lab/nexus:buildcache-release-${{ matrix.variant }}
          cache-to: type=registry,ref=ghcr.io/nexi-lab/nexus:buildcache-release-${{ matrix.variant }},mode=max,ignore-error=true

      # Smoke tests run on CPU only — CUDA PyTorch ships binaries with
      # instructions (e.g. AVX-512) not available on GitHub Actions runners,
      # causing SIGILL.  CUDA images are validated on GPU machines post-release.
      - name: Smoke test — critical imports
        if: matrix.variant == 'cpu'
        run: |
          docker run --rm --entrypoint "" \
            -e GLIBC_TUNABLES=glibc.rtld.optional_static_tls=16384 \
            ghcr.io/nexi-lab/nexus:smoke-test \
            python3 -c "
          import nexus_kernel
          from _nexus_raft import Metastore
          import txtai
          import pgvector
          import docker
          import fastembed
          import psutil
          print('All critical imports OK')
          "

      - name: Smoke test — CLI entrypoints
        if: matrix.variant == 'cpu'
        run: |
          docker run --rm --entrypoint "" \
            ghcr.io/nexi-lab/nexus:smoke-test \
            sh -c "nexus --version && nexusd --help > /dev/null 2>&1 && echo 'CLI OK'"

      - name: Smoke test — env-var config (no config file)
        if: matrix.variant == 'cpu'
        run: |
          docker run --rm --entrypoint "" \
            ghcr.io/nexi-lab/nexus:smoke-test \
            python3 -c "
          from nexus.config import load_config
          cfg = load_config()
          assert cfg.profile == 'full', f'Expected profile=full, got {cfg.profile}'
          print(f'Config OK: profile={cfg.profile}')
          "

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          build-args: TORCH_VARIANT=${{ matrix.variant }}
          cache-from: type=registry,ref=ghcr.io/nexi-lab/nexus:buildcache-release-${{ matrix.variant }}
          cache-to: type=registry,ref=ghcr.io/nexi-lab/nexus:buildcache-release-${{ matrix.variant }},mode=max,ignore-error=true

      # Zoekt sidecar — publish stable + versioned tags on release (CPU only)
      - name: Build and push Zoekt sidecar
        if: matrix.variant == 'cpu'
        uses: docker/build-push-action@v6
        with:
          context: ./dockerfiles
          file: dockerfiles/Dockerfile.zoekt
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ghcr.io/nexi-lab/nexus-zoekt:${{ steps.meta.outputs.version }},ghcr.io/nexi-lab/nexus-zoekt:stable,ghcr.io/nexi-lab/nexus-zoekt:latest
          cache-from: type=registry,ref=ghcr.io/nexi-lab/nexus-zoekt:buildcache
          cache-to: type=registry,ref=ghcr.io/nexi-lab/nexus-zoekt:buildcache,mode=max,ignore-error=true

  # GitHub Release is created ONLY after both PyPI and Docker succeed.
  # This is the user-visible "released" signal — without it, the version
  # doesn't appear on the releases page or trigger notifications.
  create-release:
    name: Create GitHub Release
    needs: [publish-pypi, publish-rust, publish-nexus-fs, publish-ts-packages, build-docker]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel
          path: artifacts/wheel

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: artifacts/sdist

      - name: Download rust artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rust-*
          path: artifacts

      - name: Download nexus-fs artifacts
        uses: actions/download-artifact@v4
        with:
          name: nexus-fs-dist
          path: artifacts/nexus-fs
        continue-on-error: true

      - name: Collect release artifacts
        run: |
          mkdir -p dist-release
          cp artifacts/sdist/* dist-release/ 2>/dev/null || true
          cp artifacts/wheel/* dist-release/ 2>/dev/null || true
          cp artifacts/rust-sdist/* dist-release/ 2>/dev/null || true
          cp artifacts/nexus-fs/* dist-release/ 2>/dev/null || true
          find artifacts -path "*/rust-wheel-*/*.whl" -exec cp {} dist-release/ \;
          ls -lh dist-release/

      - name: Extract release notes
        id: extract-release-notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ -f CHANGELOG.md ]; then
            NOTES=$(sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$ d' | tail -n +2)
            [ -z "$NOTES" ] && NOTES="Release version ${VERSION}"
          else
            NOTES="Release version ${VERSION}"
          fi
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          files: |
            dist-release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
