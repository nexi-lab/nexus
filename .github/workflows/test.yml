name: Test

on:
  push:
    branches: [main, develop, SETUP]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rpc-parity:
    name: RPC Parity Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Check RPC Parity (ENFORCEMENT)
        run: |
          echo "Checking RPC parity..."
          echo "This ensures all public methods are either:"
          echo "  1. Exposed via @rpc_expose decorator, OR"
          echo "  2. Explicitly excluded in INTERNAL_ONLY_METHODS"
          echo ""
          uv run pytest tests/unit/server/test_rpc_parity.py -v

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-test-${{ matrix.os }}"
          workspaces: |
            rust/nexus_pyo3
            rust/nexus_raft
            rust/nexus_tasks

      - name: Build Rust extension (nexus_fast)
        run: |
          cd rust/nexus_pyo3
          pip install maturin
          maturin develop --release
        shell: bash

      - name: Build Rust extension (nexus_raft)
        run: |
          cd rust/nexus_raft
          maturin develop --release --features python
        shell: bash

      - name: Build Rust extension (nexus_tasks)
        run: |
          cd rust/nexus_tasks
          maturin develop --release
        shell: bash

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev,test]"

      - name: Verify Rust extensions
        run: |
          uv run python -c "import nexus_fast; print('nexus_fast OK')"
          uv run python -c "from _nexus_raft import Metastore; print('nexus_raft OK')"
        shell: bash

      - name: Run unit tests
        run: |
          start=$(date +%s)
          uv run pytest tests/unit -v --durations=10 -n auto --dist loadgroup
          status=$?
          echo $(( $(date +%s) - start )) > unit_test_duration_sec.txt
          exit $status
        shell: bash

      - name: Unit test duration (target <3min; fail if >7min)
        if: always()
        run: |
          if [ ! -f unit_test_duration_sec.txt ]; then exit 0; fi
          dur=$(cat unit_test_duration_sec.txt)
          echo "### Unit tests" >> $GITHUB_STEP_SUMMARY
          echo "Duration: **${dur}s** (target &lt;180s; max 420s)" >> $GITHUB_STEP_SUMMARY
          if [ "$dur" -gt 420 ]; then
            echo "::error::Unit tests took ${dur}s (max 420s). Keep the suite lean; see tests/unit/README.md"
            exit 1
          fi
        shell: bash

      - name: Verify benchmark collection
        run: |
          uv run pytest tests/benchmarks/ --collect-only -q -o "addopts="
        if: matrix.os == 'ubuntu-latest'

  e2e-self-contained:
    name: E2E Tests (Self-Contained)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-test-ubuntu-latest"
          workspaces: |
            rust/nexus_pyo3
            rust/nexus_raft
            rust/nexus_tasks

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build Rust extensions
        run: |
          pip install maturin
          cd rust/nexus_pyo3 && maturin develop --release && cd ../..
          cd rust/nexus_raft && maturin develop --release --features full && cd ../..
          cd rust/nexus_tasks && maturin develop --release && cd ../..

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run self-contained e2e tests
        run: |
          uv run pytest tests/e2e/self_contained/ -v --timeout=120 -o "addopts="
        timeout-minutes: 20

  e2e-postgres:
    name: E2E Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus_test
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXUS_DATABASE_URL: postgresql://nexus_test:nexus_test@localhost:5432/nexus_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-test-ubuntu-latest"
          workspaces: |
            rust/nexus_pyo3
            rust/nexus_raft
            rust/nexus_tasks

      - name: Build Rust extensions
        run: |
          pip install maturin
          cd rust/nexus_pyo3 && maturin develop --release && cd ../..
          cd rust/nexus_raft && maturin develop --release --features python && cd ../..
          cd rust/nexus_tasks && maturin develop --release && cd ../..

      - name: Install dependencies
        run: uv pip install -e ".[dev,test,postgres]"

      - name: Run PostgreSQL e2e tests
        run: |
          uv run pytest tests/e2e/postgres/ --ignore=tests/e2e/postgres/migrations -v --timeout=120 -o "addopts="
        timeout-minutes: 10

  e2e-redis:
    name: E2E Tests (Redis)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXUS_REDIS_URL: redis://localhost:6379
      NEXUS_DRAGONFLY_COORDINATION_URL: redis://localhost:6379
      REDIS_ENABLED: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-test-ubuntu-latest"
          workspaces: |
            rust/nexus_pyo3
            rust/nexus_raft
            rust/nexus_tasks

      - name: Build Rust extensions
        run: |
          pip install maturin
          cd rust/nexus_pyo3 && maturin develop --release && cd ../..
          cd rust/nexus_raft && maturin develop --release --features python && cd ../..
          cd rust/nexus_tasks && maturin develop --release && cd ../..

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run Redis e2e tests
        run: |
          uv run pytest tests/e2e/redis/ -v --timeout=120 -o "addopts="
        timeout-minutes: 10

  e2e-docker:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-test-ubuntu-latest"
          workspaces: |
            rust/nexus_pyo3
            rust/nexus_raft
            rust/nexus_tasks

      - name: Build Rust extensions
        run: |
          pip install maturin
          cd rust/nexus_pyo3 && maturin develop --release && cd ../..
          cd rust/nexus_raft && maturin develop --release --features python && cd ../..
          cd rust/nexus_tasks && maturin develop --release && cd ../..

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run Docker e2e tests
        run: |
          uv run pytest tests/e2e/docker/ -v --timeout=180 -o "addopts="
        timeout-minutes: 15

  e2e-nats:
    name: E2E Tests (NATS)
    runs-on: ubuntu-latest
    env:
      NEXUS_NATS_URL: nats://localhost:4222
    steps:
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 nats:latest -js
          sleep 2

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-test-ubuntu-latest"
          workspaces: |
            rust/nexus_pyo3
            rust/nexus_raft
            rust/nexus_tasks

      - name: Build Rust extensions
        run: |
          pip install maturin
          cd rust/nexus_pyo3 && maturin develop --release && cd ../..
          cd rust/nexus_raft && maturin develop --release --features python && cd ../..
          cd rust/nexus_tasks && maturin develop --release && cd ../..

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run NATS e2e tests
        run: |
          uv run pytest tests/e2e/nats/ -v --timeout=120 -o "addopts="
        timeout-minutes: 10

  migration-test:
    name: Migration Tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run migration tests (SQLite)
        run: |
          uv run pytest tests/e2e/postgres/migrations/ -v -o "addopts="

  migration-test-pg:
    name: Migration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus_test
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXUS_DATABASE_URL: postgresql://nexus_test:nexus_test@localhost:5432/nexus_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.13

      - name: Install dependencies
        run: uv pip install -e ".[dev,test,postgres]"

      - name: Run migration tests (PostgreSQL)
        run: |
          uv run pytest tests/e2e/postgres/migrations/ -v -o "addopts="
