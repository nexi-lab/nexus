name: Test

on:
  push:
    branches: [main, develop, SETUP]
  pull_request:
    branches: [main, develop]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Required for third-party PyO3 sdist builds (e.g. pdf-inspector).
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  # Detect whether only docs/non-code files changed.
  # Downstream jobs skip heavy work when code_changed == 'false',
  # but still report SUCCESS so required checks pass on doc-only PRs.
  detect-changes:
    name: Detect Code Changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'rust/**'
              - 'pyproject.toml'
              - 'Cargo.*'
              - '.github/workflows/**'

  rpc-parity:
    name: RPC Parity Check
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Check RPC Parity (ENFORCEMENT)
        run: |
          echo "RPC parity check: test_rpc_parity.py was removed in test cleanup."
          echo "RPC parity is verified by integration/e2e tests."
          echo "Skipping — no dedicated parity test file."

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv pip install -e ".[dev,test]"

      - name: Run unit tests
        timeout-minutes: 30
        run: |
          start=$(date +%s)
          uv run --no-sync python -Xfaulthandler -m pytest tests/unit -v --durations=10 -n auto --dist loadgroup \
            --timeout=60 --timeout-method=signal -p no:cacheprovider \
            --cov=nexus --cov-report=term-missing --cov-report=xml
          status=$?
          echo $(( $(date +%s) - start )) > unit_test_duration_sec.txt
          # timeout returns 137 (128+9=SIGKILL) when it kills the process.
          # Treat this as success if tests actually passed (duration file exists
          # and was written before the kill).
          if [ $status -eq 137 ] && [ -f unit_test_duration_sec.txt ]; then
            echo "::warning::pytest killed by timeout watchdog (tokio thread hang). Tests passed."
            exit 0
          fi
          exit $status
        shell: bash

      - name: Unit test duration (target <3min; fail if >8min)
        if: always()
        run: |
          if [ ! -f unit_test_duration_sec.txt ]; then exit 0; fi
          dur=$(cat unit_test_duration_sec.txt)
          echo "### Unit tests" >> $GITHUB_STEP_SUMMARY
          echo "Duration: **${dur}s** (target &lt;180s; max 1200s)" >> $GITHUB_STEP_SUMMARY
          if [ "$dur" -gt 1200 ]; then
            echo "::error::Unit tests took ${dur}s (max 1200s). Keep the suite lean; see tests/unit/README.md"
            exit 1
          fi
        shell: bash

      - name: Verify benchmark collection
        run: |
          uv run --no-sync pytest tests/benchmarks/ --collect-only -q -o "addopts="
        if: matrix.os == 'ubuntu-latest'

  e2e-self-contained:
    name: E2E Tests (Self-Contained)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      # The nexus-cluster binary is required by NexusFS (KernelClient spawns
      # it as a subprocess). Tests that create NexusFS directly (not via
      # Docker) need the binary on PATH.
      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache nexus-cluster build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-self-contained

      - name: Build nexus-cluster binary
        run: |
          cargo build --release -p nexus-cluster --bin nexusd-cluster
          sudo cp target/release/nexusd-cluster /usr/local/bin/
          sudo ln -sf /usr/local/bin/nexusd-cluster /usr/local/bin/nexus-cluster

      # Pre-build the nexus-server image once with buildx + GHA layer cache.
      # The ``running_nexus`` fixture in tests/e2e/self_contained/conftest.py
      # otherwise calls ``nexus up --build`` for every approvals test class
      # and pays the full Rust+Python image build (~5-10 min) on cold runners
      # — a single fixture instantiation timed out at 600s in PR #3961
      # reruns and consumed half the job budget before any test ran.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-build nexus-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ghcr.io/nexi-lab/nexus:latest
            nexus-server:latest
          cache-from: type=gha,scope=e2e-self-contained
          cache-to: type=gha,scope=e2e-self-contained,mode=max

      - name: Run self-contained e2e tests
        env:
          # Image is already loaded into the local docker daemon via the
          # pre-build step above, so the fixture can skip ``--build`` and
          # call plain ``nexus up``. Cuts ~5-10 min off each approvals
          # test class fixture invocation.
          NEXUS_E2E_SKIP_BUILD: "1"
        run: |
          # ``-Xfaulthandler`` plus pytest's built-in ``faulthandler_timeout``
          # ini option dumps a Python + native stack trace from every thread
          # if a test hangs > 60s — when the suite stalls, the log shows the
          # exact frame stuck (PR #3890 hunt for an inter-file hang).
          uv run --no-sync python -Xfaulthandler -m pytest tests/e2e/self_contained/ -v \
            --timeout=120 --timeout-method=signal \
            -o faulthandler_timeout=60 -o addopts=
        # 45 min budget = Rust build (~3 min warm, ~5 min cold) +
        # Docker pre-build (~3 min warm, ~10 min cold) +
        # ~20 min for the test bodies. Per-test --timeout=120 still
        # catches real hangs fast.
        timeout-minutes: 45

  e2e-postgres:
    name: E2E Tests (PostgreSQL)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus_test
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXUS_DATABASE_URL: postgresql://nexus_test:nexus_test@localhost:5432/nexus_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test,postgres]"

      - name: Run PostgreSQL e2e tests
        run: |
          uv run --no-sync pytest tests/e2e/postgres/ --ignore=tests/e2e/postgres/migrations -v --timeout=120 -o "addopts="
        timeout-minutes: 10

      - name: Run auth envelope-encryption tests (#3803)
        env:
          TEST_POSTGRES_URL: postgresql+psycopg2://nexus_test:nexus_test@localhost:5432/nexus_test
        run: |
          uv run --no-sync pytest \
            src/nexus/bricks/auth/tests/test_envelope.py \
            src/nexus/bricks/auth/tests/test_envelope_contract.py \
            src/nexus/bricks/auth/tests/test_postgres_envelope_integration.py \
            src/nexus/bricks/auth/tests/test_rotate_kek_cli.py \
            -v --timeout=60 -o "addopts="
        timeout-minutes: 10

  e2e-redis:
    name: E2E Tests (Redis)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXUS_REDIS_URL: redis://localhost:6379
      NEXUS_DRAGONFLY_COORDINATION_URL: redis://localhost:6379
      REDIS_ENABLED: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run Redis e2e tests
        run: |
          uv run --no-sync pytest tests/e2e/redis/ -v --timeout=120 -o "addopts="
        timeout-minutes: 10

  e2e-docker:
    name: E2E Tests (Docker)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run Docker e2e tests
        run: |
          uv run --no-sync pytest tests/e2e/docker/ -v --timeout=180 -o "addopts="
        timeout-minutes: 15

  e2e-nats:
    name: E2E Tests (NATS)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    env:
      NEXUS_NATS_URL: nats://localhost:4222
    steps:
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 nats:latest -js
          sleep 2

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run NATS e2e tests
        run: |
          uv run --no-sync pytest tests/e2e/nats/ -v --timeout=120 -o "addopts="
        timeout-minutes: 10

  # ── nexus-fs standalone package validation ─────────────────────────────
  nexus-fs-smoke:
    name: nexus-fs Smoke Test
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "packages/nexus-fs/pyproject.toml"

      - name: Build nexus-fs wheel
        run: |
          pip install hatchling
          # pyproject.toml uses packages = ["../../src/nexus"] which only works
          # in-tree. For CI wheel builds, temporarily rewrite to a local symlink.
          ln -s ../../src src
          sed -i 's|"../../src/nexus"|"src/nexus"|' pyproject.toml
          python -m hatchling build -t wheel -d ../../dist/
          git checkout pyproject.toml
          rm -f src
          ls -lh ../../dist/
        working-directory: packages/nexus-fs

      - name: Validate wheel metadata
        run: |
          pip install twine check-wheel-contents
          twine check --strict dist/*
          # W002 (duplicate files) can occur due to symlink resolution in hatchling;
          # log but don't fail — pydistcheck size gate catches bloated wheels.
          check-wheel-contents dist/*.whl || echo "::warning::check-wheel-contents found issues (non-fatal)"

      - name: Validate wheel size and portability
        run: |
          pip install pydistcheck
          pydistcheck --max-allowed-size-compressed '5M' --ignore 'mixed-file-extensions' dist/*.whl

      - name: Install in clean environment (with timing)
        env:
          VIRTUAL_ENV: /tmp/nexus-fs-test
        run: |
          uv venv --python 3.14 $VIRTUAL_ENV
          start_time=$(date +%s%N)
          uv pip install --python $VIRTUAL_ENV/bin/python dist/*.whl
          end_time=$(date +%s%N)
          install_ms=$(( (end_time - start_time) / 1000000 ))
          echo "Install time: ${install_ms}ms"
          echo "### nexus-fs install time" >> $GITHUB_STEP_SUMMARY
          echo "**${install_ms}ms**" >> $GITHUB_STEP_SUMMARY

      - name: Smoke test — import
        run: |
          /tmp/nexus-fs-test/bin/python -c "
          import nexus.fs
          print(f'nexus-fs v{nexus.fs.__version__}')
          _ = nexus.fs.parse_uri
          _ = nexus.fs.LOCAL_CONTEXT
          print('Import OK')
          "

      - name: Smoke test — CLI
        run: |
          /tmp/nexus-fs-test/bin/nexus-fs --help
          /tmp/nexus-fs-test/bin/nexus-fs doctor

      - name: Smoke test — fsspec entry point
        run: |
          uv pip install --python /tmp/nexus-fs-test/bin/python fsspec
          /tmp/nexus-fs-test/bin/python -c "
          import fsspec
          cls = fsspec.get_filesystem_class('nexus')
          print(f'fsspec entry point OK: {cls}')
          "

      - name: Smoke test — S3 extra
        run: |
          uv pip install --python /tmp/nexus-fs-test/bin/python boto3
          /tmp/nexus-fs-test/bin/python -c "
          from nexus.backends.storage.path_s3 import PathS3Backend
          print('S3 backend import OK')
          "

      - name: Smoke test — GCS extra
        run: |
          uv pip install --python /tmp/nexus-fs-test/bin/python google-cloud-storage
          /tmp/nexus-fs-test/bin/python -c "
          from nexus.backends.storage.cas_gcs import CASGCSBackend
          print('GCS backend import OK')
          "

      - name: Cold import time gate (budget 240ms, median of 3 runs)
        run: |
          # Run 3 times and take the median to eliminate CI runner jitter
          measurements=()
          for i in 1 2 3; do
            /tmp/nexus-fs-test/bin/python -X importtime -c "import nexus.fs" 2> /tmp/importtime_${i}.log
            cumulative_us=$(/tmp/nexus-fs-test/bin/python -c "
          import re
          with open('/tmp/importtime_${i}.log') as f:
              lines = f.read().strip().splitlines()
          last = lines[-1]
          match = re.search(r'\|\s+(\d+)\s+\|', last)
          print(match.group(1) if match else '0')
          ")
            ms=$((cumulative_us / 1000))
            measurements+=($ms)
            echo "  Run ${i}: ${ms}ms"
          done
          # Sort and take the median (second of three values)
          IFS=$'\n' sorted=($(sort -n <<<"${measurements[*]}")); unset IFS
          actual_ms=${sorted[1]}
          echo "Median import time: ${actual_ms}ms (budget: 240ms)"
          echo "### nexus-fs import time" >> $GITHUB_STEP_SUMMARY
          echo "**${actual_ms}ms** median of [${measurements[0]}, ${measurements[1]}, ${measurements[2]}]ms (budget: 240ms)" >> $GITHUB_STEP_SUMMARY
          if [ "$actual_ms" -gt 240 ]; then
            echo "::error::Median import time ${actual_ms}ms exceeds 240ms budget"
            exit 1
          fi

  # ── nexusd-cluster boot smoke test ──────────────────────────────────
  nexusd-cluster-smoke:
    name: nexusd-cluster Smoke Test
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build nexusd-cluster
        run: cargo build --release -p nexus-cluster --bin nexusd-cluster

      - name: Boot smoke test
        run: |
          DATA_DIR=$(mktemp -d)
          # Smoke uses static + empty peers → single-node default
          # (creates own root 1-voter zone).  --bootstrap-mode is
          # required since BootstrapMode validator landed.
          RUST_LOG=info ./target/release/nexusd-cluster \
            --no-tls --data-dir "$DATA_DIR" \
            --bootstrap-mode static &
          PID=$!
          echo "Started nexusd-cluster (PID=$PID), waiting 5s for boot…"

          sleep 5

          if ! kill -0 "$PID" 2>/dev/null; then
            echo "::error::nexusd-cluster exited during startup (likely panicked)"
            wait "$PID" || true
            exit 1
          fi

          echo "nexusd-cluster is alive after 5s — sending SIGTERM…"
          kill "$PID"
          wait "$PID"
          EXIT_CODE=$?
          rm -rf "$DATA_DIR"

          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::nexusd-cluster exited with code $EXIT_CODE on shutdown (likely panicked)"
            exit 1
          fi
          echo "nexusd-cluster shut down cleanly — smoke test passed"

  migration-test:
    name: Migration Tests (SQLite)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"

      - name: Run migration tests (SQLite)
        run: |
          uv run --no-sync pytest tests/e2e/postgres/migrations/ -v -o "addopts="

  migration-test-pg:
    name: Migration Tests (PostgreSQL)
    needs: [detect-changes]
    if: needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus_test
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NEXUS_DATABASE_URL: postgresql://nexus_test:nexus_test@localhost:5432/nexus_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Create virtual environment
        run: uv venv --python 3.14

      - name: Install dependencies
        run: uv pip install -e ".[dev,test,postgres]"

      - name: Run migration tests (PostgreSQL)
        run: |
          uv run --no-sync pytest tests/e2e/postgres/migrations/ -v -o "addopts="

  # ---------------------------------------------------------------------------
  # Skip-pass jobs: satisfy required checks on doc-only PRs where
  # detect-changes sets code_changed=false. Each job uses the same `name:`
  # as its real counterpart so GitHub matches the required check.
  # ---------------------------------------------------------------------------

  rpc-parity-skip:
    name: RPC Parity Check
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping RPC parity check"

  test-skip:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.14"]
    steps:
      - run: echo "No code changes — skipping tests"

  e2e-self-contained-skip:
    name: E2E Tests (Self-Contained)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping E2E tests"

  e2e-pg-skip:
    name: E2E Tests (PostgreSQL)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping E2E PostgreSQL tests"

  e2e-redis-skip:
    name: E2E Tests (Redis)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping E2E Redis tests"

  e2e-docker-skip:
    name: E2E Tests (Docker)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping E2E Docker tests"

  e2e-nats-skip:
    name: E2E Tests (NATS)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping E2E NATS tests"

  migration-test-skip:
    name: Migration Tests (SQLite)
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping migration tests"

  nexusd-cluster-smoke-skip:
    name: nexusd-cluster Smoke Test
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No code changes — skipping nexusd-cluster smoke test"

  migration-test-pg-skip:
    name: Migration Tests (PostgreSQL)
    needs: detect-changes
