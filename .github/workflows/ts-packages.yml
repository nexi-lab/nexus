name: TypeScript Packages

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'packages/**'

jobs:
  api-client:
    name: "@nexus-ai-fs/api-client"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/nexus-api-client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install
      - run: npm run lint
      - run: npm run test:coverage

  nexus-pay-ts:
    name: "@nexus-ai-fs/pay"
    runs-on: ubuntu-latest
    needs: api-client
    defaults:
      run:
        working-directory: packages/nexus-pay-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      # Build api-client first (nexus-pay-ts depends on it)
      - run: cd ../nexus-api-client && npm install && npm run build
      - run: npm install
      - run: npm run lint
      - run: npm run test:coverage

  nexus-tui:
    name: "@nexus-ai-fs/tui"
    runs-on: ubuntu-latest
    needs: api-client
    defaults:
      run:
        working-directory: packages/nexus-tui
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Build api-client first
      - run: cd ../nexus-api-client && npm install && npm run build

      - run: bun install
      - run: node scripts/patch-jsx-types.cjs
      - run: bun test
