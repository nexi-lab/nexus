# Pre-commit hooks optimized for speed (<5s)
# Slow checks (tests, mypy, clippy) are disabled but kept as comments for future reference
# These slow checks still run in CI

repos:
  # Fast file checks (< 1s)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: (^|/)mkdocs\.yml$
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  # Fast Python lint + format (2-3s) - CRITICAL for avoiding CI format failures
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^benchmarks/
      - id: ruff-format
        exclude: ^benchmarks/

  # Type checking — uses project venv mypy for correct type resolution
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'if [ -x .venv/bin/python ]; then exec .venv/bin/python -m mypy "$@"; elif [ -x .venv/Scripts/python ]; then exec .venv/Scripts/python -m mypy "$@"; else echo "mypy skipped - no .venv found (runs in CI)" && exit 0; fi' --
        language: system
        types: [python]
        exclude: ^(tests/|alembic/|examples/|benchmarks/|\.claude/|scripts/|nexus-plugin-)|_pb2(_grpc)?\.py$

  - repo: local
    hooks:
      # Code quality standards (Phase 1)
      - id: check-file-size
        name: Check File Size Limit
        entry: python .pre-commit-hooks/check_file_size.py
        language: python
        files: \.(py|ts|tsx)$
        exclude: ^tests/

      - id: check-type-ignore
        name: Block New Type Ignores
        entry: python .pre-commit-hooks/check_type_ignore.py
        language: python
        files: \.py$
        exclude: ^\.pre-commit-hooks/

      - id: check-brick-imports
        name: Brick Zero-Core-Imports Check
        entry: python .pre-commit-hooks/check_brick_imports.py
        language: python
        files: \.py$
        pass_filenames: true

      # DISABLED: RPC Parity test (pytest, slow) - runs in CI instead
      # Uncomment to re-enable:
      # - id: rpc-parity
      #   name: RPC Parity Check
      #   entry: bash -c 'uv run pytest tests/unit/server/test_rpc_parity.py::test_all_public_methods_are_exposed_or_excluded -v'
      #   language: system
      #   pass_filenames: false
      #   files: ^src/nexus/core/nexus_fs.*\.py$

      # DISABLED: Version consistency test (pytest, slow) - runs in CI instead
      # Uncomment to re-enable:
      # - id: version-consistency
      #   name: Version Consistency Check
      #   entry: bash -c '.venv/bin/python -m pytest tests/unit/test_version_consistency.py::test_version_consistency -v --tb=short'
      #   language: system
      #   pass_filenames: false
      #   files: ^(pyproject\.toml|src/nexus/__init__\.py)$

      # Fast Rust format check (< 2s)
      - id: rust-fmt-fast
        name: Rust Format Check (kernel)
        entry: bash -c 'cd rust/kernel && cargo fmt --check'
        language: system
        pass_filenames: false
        files: ^rust/kernel/.*\.rs$

      - id: rust-fmt-raft
        name: Rust Format Check (raft)
        entry: bash -c 'cd rust/raft && cargo fmt --check'
        language: system
        pass_filenames: false
        files: ^rust/raft/.*\.rs$

      # Rust clippy (requires compilation, ~10-30s per crate)
      - id: rust-clippy-fast
        name: Rust Clippy (kernel)
        entry: bash -c 'cd rust/kernel && cargo clippy --all-targets -- -D warnings'
        language: system
        pass_filenames: false
        files: ^rust/kernel/.*\.rs$

      - id: rust-clippy-raft
        name: Rust Clippy (raft)
        entry: bash -c 'cd rust/raft && cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        pass_filenames: false
        files: ^rust/raft/.*\.rs$

      # Codegen sync check — verify all 4 generated files (Python + Rust) are up-to-date
      - id: codegen-check
        name: Codegen Sync Check
        entry: python3 scripts/codegen_kernel_abi.py --check
        language: system
        pass_filenames: false
        files: ^(rust/kernel/src/.*\.rs|scripts/codegen_kernel_abi\.py|stubs/nexus_kernel/|src/nexus/core/kernel_)$

      # Rust quality: no todo!()/unimplemented!() in committed code
      - id: rust-no-todo
        name: "No todo!/unimplemented! in Rust"
        entry: >-
          bash -c 'grep -rn "todo!\|unimplemented!" rust/kernel/src/ --include="*.rs"
          && echo "ERROR: Remove todo/unimplemented before committing" && exit 1 || exit 0'
        language: system
        pass_filenames: false
        files: ^rust/kernel/.*\.rs$
