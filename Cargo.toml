[workspace]
resolver = "2"
members = [
    "rust/contracts",
    "rust/library",
    "rust/transport",
    "rust/kernel",
    "rust/services",
    "rust/raft",
    "rust/tasks",
]
# nexus-fuse excluded: standalone FUSE daemon with different dependency versions
exclude = ["nexus-fuse"]

[workspace.dependencies]
contracts = { path = "rust/contracts" }
library = { path = "rust/library" }
transport = { path = "rust/transport" }
services = { path = "rust/services" }
# `default-features = false` at workspace level so crates that pull kernel
# as an rlib dependency (e.g. raft's `python` feature → zone_metastore)
# don't drag in kernel's mimalloc `#[global_allocator]`, which would
# conflict with the downstream cdylib's own allocator. Re-enable the other
# kernel defaults (`connectors`, `py-hook-adapters`) explicitly — only
# `mimalloc` is dropped.
kernel = { path = "rust/kernel", default-features = false, features = ["connectors", "py-hook-adapters"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ahash = "0.8"
regex = "1.10"
memchr = "2.7"
roaring = "0.10"
globset = "0.4"
blake3 = "1.5"
string-interner = "0.17"
regex-syntax = "0.8"
crc32fast = "1.4"
mimalloc = { version = "0.1", default-features = false }
tonic = { version = "0.13", features = ["transport", "tls-ring"] }
prost = "0.13"

[profile.dev]
opt-level = 1
debug = "line-tables-only"
incremental = true

[profile.dev.package."*"]
opt-level = 2

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = "debuginfo"
