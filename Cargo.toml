[workspace]
resolver = "2"
members = [
    "rust/contracts",
    "rust/library",
    "rust/transport",
    "rust/kernel",
    "rust/services",
    "rust/raft",
    "rust/tasks",
    "rust/cluster",
]
# nexus-fuse excluded: standalone FUSE daemon with different dependency versions
exclude = ["nexus-fuse"]

[workspace.dependencies]
contracts = { path = "rust/contracts" }
library = { path = "rust/library" }
transport = { path = "rust/transport" }
services = { path = "rust/services" }
# F2 C8 (Option A): raft is an rlib inside the nexus_kernel cdylib.
# kernel pulls it in as a Rust dependency to reach ZoneConsensus /
# FullStateMachine for federation metastore wiring. Direction is
# kernel -> raft only (no cycle).
raft = { path = "rust/raft", default-features = false, features = ["python", "grpc"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ahash = "0.8"
regex = "1.10"
memchr = "2.7"
roaring = "0.10"
globset = "0.4"
blake3 = "1.5"
string-interner = "0.17"
regex-syntax = "0.8"
crc32fast = "1.4"
fastcdc = "3.2"
mimalloc = { version = "0.1", default-features = false }
tonic = { version = "0.13", features = ["transport", "tls-ring"] }
prost = "0.13"

[profile.dev]
opt-level = 1
debug = "line-tables-only"
incremental = true

[profile.dev.package."*"]
opt-level = 2

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = "symbols"

# Cluster binary ships standalone for sudowork; size matters more than
# raw throughput. opt-level="z" picks the cluster code path that
# minimizes object size. On Linux x86_64 with workspace-wide
# strip="symbols", the binary lands around 5-6 MB; on Windows MSVC
# the .exe is closer to 8 MB (PE headers + import tables don't
# compress as much as stripped ELF). CI's size gate (Group F) checks
# the Linux artifact.
[profile.release.package.nexus-cluster]
opt-level = "z"
