[workspace]
resolver = "2"
members = [
    "rust/nexus_core",
    "rust/nexus_transport",
    "rust/nexus_kernel",
    "rust/nexus_raft",
    "rust/nexus_tasks",
]
# nexus-fuse excluded: standalone FUSE daemon with different dependency versions
exclude = ["nexus-fuse"]

[workspace.dependencies]
nexus_core = { path = "rust/nexus_core" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ahash = "0.8"
regex = "1.10"
memchr = "2.7"
roaring = "0.10"
globset = "0.4"
blake3 = "1.5"
string-interner = "0.17"
regex-syntax = "0.8"
crc32fast = "1.4"
mimalloc = { version = "0.1", default-features = false }
tonic = { version = "0.13", features = ["transport", "tls-ring"] }
prost = "0.13"
nexus_transport = { path = "rust/nexus_transport" }

[profile.dev]
opt-level = 1
debug = "line-tables-only"
incremental = true

[profile.dev.package."*"]
opt-level = 2

[profile.release]
lto = "thin"
codegen-units = 1
opt-level = 3
strip = "debuginfo"
