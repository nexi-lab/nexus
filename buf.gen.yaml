version: v2
plugins:
  # Python protobuf stubs
  - remote: buf.build/protocolbuffers/python
    out: src/nexus/server/api/v2/generated
  # OpenAPI 3.1 generation
  - remote: buf.build/community/google-gnostic-openapi
    out: docs/protocol
    opt:
      - naming=proto
  # TypeScript message classes (Connect-ES)
  - remote: buf.build/bufbuild/es
    out: packages/nexus-grpc-ts/src/gen
    opt:
      - target=ts
  # TypeScript service descriptors / Connect-RPC client
  - remote: buf.build/connectrpc/es
    out: packages/nexus-grpc-ts/src/gen
    opt:
      - target=ts
