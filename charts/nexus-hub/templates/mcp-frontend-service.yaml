apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-hub.mcpFrontendName" . }}
  labels:
    {{- include "nexus-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-frontend
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.mcpPort }}
      targetPort: http
  selector:
    {{- include "nexus-hub.selectorLabels" (dict "root" . "component" "mcp-frontend") | nindent 4 }}
