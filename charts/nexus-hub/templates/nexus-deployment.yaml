apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-hub.nexusName" . }}
  labels:
    {{- include "nexus-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: nexus
spec:
  replicas: {{ .Values.nexus.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-hub.selectorLabels" (dict "root" . "component" "nexus") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.nexus.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nexus-hub.selectorLabels" (dict "root" . "component" "nexus") | nindent 8 }}
        {{- with .Values.nexus.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: nexus
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["nexusd"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.service.nexusHttpPort | quote }}
            - "--profile"
            - {{ .Values.nexus.profile | quote }}
            - "--auth-type"
            - "database"
            - "--database-url"
            - "$(NEXUS_DATABASE_URL)"
          env:
            - name: NEXUS_PROFILE
              value: {{ .Values.nexus.profile | quote }}
            - name: NEXUS_DATA_DIR
              value: /data
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus-hub.postgresSecretName" . }}
                  key: {{ include "nexus-hub.postgresPasswordKey" . }}
            - name: NEXUS_DATABASE_URL
              value: "postgresql://{{ include "nexus-hub.postgresUsername" . }}:$(POSTGRES_PASSWORD)@{{ include "nexus-hub.postgresHost" . }}:{{ include "nexus-hub.postgresPort" . }}/{{ include "nexus-hub.postgresDatabase" . }}"
            - name: NEXUS_REDIS_URL
{{ if and (not .Values.redis.internal.enabled) .Values.redis.external.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.existingSecret }}
                  key: {{ .Values.redis.external.existingSecretUrlKey }}
{{ else }}
              value: {{ include "nexus-hub.redisUrl" . | quote }}
{{ end }}
            - name: NEXUS_GRPC_BIND_ALL
              value: "true"
            - name: NEXUS_GRPC_PORT
              value: {{ .Values.service.nexusGrpcPort | quote }}
            - name: NEXUS_ADVERTISE_ADDR
              value: "{{ include "nexus-hub.nexusName" . }}:{{ .Values.service.nexusGrpcPort }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.nexusHttpPort }}
            - name: grpc
              containerPort: {{ .Values.service.nexusGrpcPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.nexus.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      {{- with .Values.nexus.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nexus.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nexus.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          {{- if .Values.nexus.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "nexus-hub.nexusName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.nexus.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nexus-hub.nexusName" . }}
  labels:
    {{- include "nexus-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: nexus
spec:
  accessModes:
    {{- toYaml .Values.nexus.persistence.accessModes | nindent 4 }}
  {{- if .Values.nexus.persistence.storageClass }}
  storageClassName: {{ .Values.nexus.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.nexus.persistence.size | quote }}
{{- end }}
