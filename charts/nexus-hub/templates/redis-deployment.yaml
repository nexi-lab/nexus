{{- if .Values.redis.internal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-hub.redisName" . }}
  labels:
    {{- include "nexus-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "nexus-hub.selectorLabels" (dict "root" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-hub.selectorLabels" (dict "root" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.internal.image | quote }}
          imagePullPolicy: {{ .Values.redis.internal.imagePullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.redis.internal.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.redis.internal.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "nexus-hub.redisName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if .Values.redis.internal.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nexus-hub.redisName" . }}
  labels:
    {{- include "nexus-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  accessModes:
    {{- toYaml .Values.redis.internal.persistence.accessModes | nindent 4 }}
  {{- if .Values.redis.internal.persistence.storageClass }}
  storageClassName: {{ .Values.redis.internal.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.internal.persistence.size | quote }}
{{- end }}
{{- end }}
