image:
  repository: ghcr.io/nexi-lab/nexus
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

nexus:
  profile: full
  replicaCount: 1
  podAnnotations: {}
  podLabels: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

mcpFrontend:
  replicaCount: 1
  podAnnotations: {}
  podLabels: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  internal:
    enabled: true
    image: pgvector/pgvector:pg17
    imagePullPolicy: IfNotPresent
    resources: {}
    persistence:
      enabled: true
      size: 20Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
  auth:
    database: nexus
    username: nexus
    password: nexus
    existingSecret: ""
    existingSecretPasswordKey: password
  external:
    host: ""
    port: 5432
    database: nexus
    username: nexus
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: password

redis:
  internal:
    enabled: true
    image: redis:7-alpine
    imagePullPolicy: IfNotPresent
    resources: {}
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
  external:
    url: ""
    existingSecret: ""
    existingSecretUrlKey: redis-url

service:
  type: ClusterIP
  mcpPort: 8081
  nexusHttpPort: 2026
  nexusGrpcPort: 2028

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls:
    enabled: false
    secretName: ""

podMonitor:
  enabled: false
  labels: {}
  interval: 30s
  scrapeTimeout: 10s

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
