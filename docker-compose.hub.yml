# Reference hub deployment for issue #3784.
#
# Architecture (two-service design):
#
#   ┌──────────────────┐        ┌──────────────────┐        ┌──────────────┐
#   │ MCP clients      │──────▶ │ mcp-frontend     │──────▶ │ nexus (RPC)  │
#   │ (bearer token)   │  :8081 │ nexus mcp serve  │  :2026 │ nexusd       │
#   └──────────────────┘        │   --url nexus    │        │   --database │
#                               └──────────────────┘        └──────────────┘
#                                                                   │
#                                                          ┌────────┴────────┐
#                                                          ▼                 ▼
#                                                     postgres (auth)   redis (metrics)
#
# Auth flow:
#   1. client sends `Authorization: Bearer sk-...` to mcp-frontend :8081
#   2. mcp-frontend extracts the bearer, opens a per-request remote NexusFS
#      connection to the RPC server with that bearer as api_key
#   3. the RPC server validates the bearer via DatabaseAPIKeyAuth
#      (postgres-backed api_keys table) and resolves zone/is_admin from
#      APIKeyModel — identity/zone isolation is enforced at the RPC layer
#   4. missing/invalid/expired/revoked tokens are rejected with 401 at the
#      RPC layer before any filesystem mutation happens
#
# Bootstrap (first time):
#   export POSTGRES_PASSWORD=<strong-random-value>
#   docker compose -f docker-compose.hub.yml up -d
#   docker compose -f docker-compose.hub.yml exec nexus \
#     nexus hub token create --name root --admin --zone root
#   # save the printed `sk-...` token — it is shown once and never again
#
# TLS: terminate at a reverse proxy (Caddy/nginx) in front of port 8081.
# Sample proxy config in docs/hub-deploy.md.

services:
  nexus:
    image: ghcr.io/nexi-lab/nexus:latest
    entrypoint: ["nexusd"]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "2026"
      - "--deployment-profile"
      - "full"
      - "--auth-type"
      - "database"
      - "--database-url"
      - "postgresql://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus"
    environment:
      NEXUS_DATA_DIR: /data
      NEXUS_REDIS_URL: redis://redis:6379
      # Exposed to the hub CLI (`nexus hub …`) which talks direct-to-DB.
      NEXUS_DATABASE_URL: postgresql://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus
      # Bind the gRPC listener on all interfaces inside the container so
      # the mcp-frontend service on the same compose network can reach
      # it. Without this, nexusd binds gRPC to loopback only and the
      # frontend cannot open a remote NexusFS connection.
      NEXUS_GRPC_BIND_ALL: "true"
      NEXUS_GRPC_PORT: "2028"
      # Advertise the in-network hostname so connect callbacks resolve
      # back to this container rather than 0.0.0.0 (which fails the
      # rpc_transport loopback check on the frontend).
      NEXUS_ADVERTISE_ADDR: "nexus:2028"
    volumes:
      - nexus-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2026/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  mcp-frontend:
    image: ghcr.io/nexi-lab/nexus:latest
    # The base image ships a docker-entrypoint.sh that boots nexusd; we
    # need to run `nexus mcp serve` instead, so clear the entrypoint and
    # let `command:` be execed directly.
    entrypoint: []
    environment:
      # Point MCP at the RPC server — bearer tokens flow through as the
      # per-request api_key for the remote NexusFS connection, so the
      # RPC server's DatabaseAPIKeyAuth enforces per-token identity/zone.
      NEXUS_URL: http://nexus:2026
      NEXUS_REDIS_URL: redis://redis:6379
      # The compose network is private. gRPC between frontend and nexus
      # is plaintext by design (TLS terminates at the public reverse
      # proxy, see §6 of docs/hub-deploy.md). Opt into the escape hatch
      # so rpc_transport.py accepts the non-loopback `nexus:2028`
      # target. Never enable this in a deployment that crosses an
      # untrusted network.
      NEXUS_GRPC_ALLOW_INSECURE: "true"
      # Intentionally DO NOT set NEXUS_API_KEY here — we want
      # unauthenticated requests (no bearer) to fail at the RPC layer
      # rather than fall through to an ambient "frontend" identity.
    ports:
      - "8081:8081"
    depends_on:
      nexus:
        condition: service_healthy
    command: ["nexus", "mcp", "serve", "--transport", "http", "--host", "0.0.0.0", "--port", "8081"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  nexus-data:
  postgres-data:
  redis-data:
