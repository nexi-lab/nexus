# Dynamic Federation E2E Test — Minimal cluster profile (no PostgreSQL)
# =========================================================================
# Uses 'cluster' profile: Raft + federation only, no auth/audit/ReBAC.
# Nodes start independently (CockroachDB pattern) — no ordering hacks.
#
# Usage:
#   docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml up -d
#   docker compose -f dockerfiles/docker-compose.dynamic-federation-test.yml logs -f test
#
# Target topology (built dynamically by tests):
#   /              (root zone — bootstrapped at startup)
#   /corp/         → DT_MOUNT → zone "corp"       (created by test)
#   /corp/eng/     → DT_MOUNT → zone "corp-eng"   (nested, created by test)
#   /corp/sales/   → DT_MOUNT → zone "corp-sales" (created by test)
#   /family/       → DT_MOUNT → zone "family"     (created by test)
#   /family/work/  → DT_MOUNT → zone "corp"       (cross-link, created by test)

services:
  # ==========================================================================
  # Dragonfly — CacheStore (optional, NullCacheStore fallback if removed)
  # ==========================================================================
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: nexus-dyn-dragonfly
    hostname: dragonfly
    restart: unless-stopped
    command: >
      dragonfly
      --maxmemory=256mb
      --proactor_threads=1
      --logtostderr
      --cache_mode=true
    # No host port publish — the test cluster uses the internal
    # dyn-nexus-network, and Windows Docker Desktop reserves 6339-6440
    # (Hyper-V excluded range) which blocks the default 6379 bind.
    expose:
      - "6379"
    volumes:
      - dyn_dragonfly_data:/data
    networks:
      - dyn-nexus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ==========================================================================
  # NexusFS Node 1 — cluster profile (no PostgreSQL)
  # ==========================================================================
  nexus-1:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile.nexusd-cluster
    image: nexusd-cluster:latest
    container_name: nexus-dyn-node-1
    hostname: nexus-1
    restart: unless-stopped
    # Slim image already has nexusd-cluster as ENTRYPOINT; override-
    # to-empty would re-introduce a shell wrapper. Leave as default.
    depends_on:
      dragonfly:
        condition: service_healthy
    environment:
      NEXUS_DATA_DIR: /app/data

      # Raft
      NEXUS_BIND_ADDR: 0.0.0.0:2126
      NEXUS_ADVERTISE_ADDR: nexus-1:2126
      # Address book lists OTHER nodes only — self enters the cluster
      # via NEXUS_BOOTSTRAP_NEW=1 (founder) or AddNode (joiner), not
      # the address book.  See docs/architecture/federation-memo.md
      # §6.3.1 and `validate_peers_excludes_self`.
      NEXUS_PEERS: "nexus-2:2126,witness:2126"
      NEXUS_RAFT_TLS: "false"
      # Founder of the cluster under the opaque-ID contract: creates
      # a 1-voter `root` zone; nexus-2 + witness JoinZone into it.
      NEXUS_BOOTSTRAP_NEW: "1"
      # Explicit bootstrap intent — `static` for env-driven cluster
      # formation.  See `BootstrapMode` in `nexus_raft`.
      NEXUS_BOOTSTRAP_MODE: "static"

      RUST_LOG: info,nexus_raft=debug
    # Local workaround: host ports commented out because Windows Docker
    # Desktop's Hyper-V reserves 2085-2184 after boot (random on each
    # restart). E2E tests use internal dyn-nexus-network hostnames
    # (nexus-1:2126) from the in-compose `test` service, so host
    # publishing is not required.
    # ports:
    #   - "2126:2126"
    volumes:
      - dyn_nexus1_data:/app/data
    networks:
      - dyn-nexus-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/2126' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s

  # ==========================================================================
  # NexusFS Node 2 — cluster profile (no PostgreSQL)
  # No depends_on nexus-1 — CockroachDB pattern: start independently
  # ==========================================================================
  nexus-2:
    image: nexusd-cluster:latest
    container_name: nexus-dyn-node-2
    hostname: nexus-2
    restart: unless-stopped
    # Slim image already has nexusd-cluster as ENTRYPOINT.
    depends_on:
      dragonfly:
        condition: service_healthy
    environment:
      NEXUS_DATA_DIR: /app/data

      NEXUS_BIND_ADDR: 0.0.0.0:2126
      NEXUS_ADVERTISE_ADDR: nexus-2:2126
      # Address book = other peers only.  Joiner: AddNode through
      # nexus-1 (the founder) under the JoinZone retry-loop branch.
      NEXUS_PEERS: "nexus-1:2126,witness:2126"
      NEXUS_RAFT_TLS: "false"
      # Explicit bootstrap intent — `static` for env-driven cluster
      # formation.  See `BootstrapMode` in `nexus_raft`.
      NEXUS_BOOTSTRAP_MODE: "static"

      RUST_LOG: info,nexus_raft=debug
    # Local workaround (see nexus-1 note): host publish commented out.
    # ports:
    #   - "2127:2126"
    volumes:
      - dyn_nexus2_data:/app/data
    networks:
      - dyn-nexus-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/2126' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s

  # ==========================================================================
  # Raft Witness — vote-only node
  # ==========================================================================
  witness:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile.raft-witness
    container_name: nexus-dyn-witness
    hostname: witness
    restart: unless-stopped
    depends_on:
      dragonfly:
        condition: service_healthy
    environment:
      NEXUS_BIND_ADDR: 0.0.0.0:2126
      # Witness needs self in its NEXUS_PEERS so `bin/witness.rs` can
      # find its own entry by hostname-derived `node_id` and publish
      # the matching advertise address (`StepMessage.sender_address`
      # carrier).  The `validate_peers_excludes_self` contract only
      # applies to `init_from_env` / `nexusd-cluster::open_zone_manager`
      # — witness has its own boot path with id-based self-detection.
      NEXUS_PEERS: "nexus-1:2126,nexus-2:2126,witness:2126"
      NEXUS_DATA_DIR: /home/nexus/data
      RUST_LOG: info,nexus_raft=debug
    # Local workaround: host port publish commented out because Windows
    # Docker Desktop reserves 2085-2184 in Hyper-V excluded-range after
    # boot (random on each restart). Witness is only reached via the
    # internal dyn-nexus-network — tests do not hit it from host.
    # ports:
    #   - "2128:2126"
    volumes:
      - dyn_witness_data:/home/nexus/data
    networks:
      - dyn-nexus-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/2126' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ==========================================================================
  # Nexus CLI sidecar — host for `docker exec nexus-cli nexus ...` calls
  #
  # Architecturally: cluster nodes are *servers* — they own PathLocalBackend
  # as their SSOT and answer gRPC. CLI work belongs in a *client* image.
  # The two roles cleanly separate, and this sidecar realises the client
  # half inside the compose network.
  #
  # Mechanism: nexus-remote is the CLI client image (RemoteBackend +
  # RemoteService = syscall forward to a server over gRPC). Running
  # `nexus zone export`/`zone list`/`federation status` in here exercises
  # exactly the same path as an external SDK user — no node-local CLI
  # shortcut. Sidecar is effectively a "docker-resident sysadmin pod"
  # pointed at the in-compose cluster.
  # ==========================================================================
  nexus-cli:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile.remote
    image: nexus-remote:latest
    container_name: nexus-dyn-cli
    hostname: nexus-cli
    # Keep the container running so `docker exec ... nexus <cmd>` works.
    # The image's default ENTRYPOINT runs `nexus --help` and exits.
    entrypoint: ["sleep", "infinity"]
    depends_on:
      nexus-1:
        condition: service_healthy
    environment:
      NEXUS_URL: "grpc://nexus-1:2126"
    networks:
      - dyn-nexus-network

  # ==========================================================================
  # SSE mock sidecar — OpenAI + Anthropic streaming responses for the
  # Rust OpenAIBackend / AnthropicBackend E2E tests.
  # ==========================================================================
  sse-mock:
    build:
      context: sse-mock
      dockerfile: Dockerfile
    image: nexus-sse-mock:latest
    container_name: nexus-dyn-sse-mock
    hostname: sse-mock
    networks:
      - dyn-nexus-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request, sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8080/healthz\").status == 200 else 1)' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ==========================================================================
  # E2E Test Runner — dynamic federation tests
  #
  # profiles=["run"] opts the service out of default `docker compose up`.
  # Without this, `up -d` spawns a background pytest container that races
  # with any manual `docker compose run --rm test` against the same cluster
  # (both call container.stop(nexus-dyn-node-1) during the failover tests —
  # 4 stops instead of 2, witness redb lock conflicts, cascade of gRPC
  # UNAVAILABLE failures). Explicit profile → `up -d` only brings up the
  # cluster; tests are opt-in via `run --rm test` or `--profile run up`.
  # ==========================================================================
  test:
    # The pytest runner needs the full Python env (gRPC client, docker
    # SDK, federation surface helpers) — keep it on nexus-fullnode while
    # the cluster nodes themselves run the slim nexusd-cluster image.
    # Build directive lives here (previously on nexus-1) so local users
    # running `docker compose build` still get nexus-fullnode built.
    build:
      context: ..
      dockerfile: Dockerfile
    image: nexus-fullnode:latest
    container_name: nexus-dyn-test
    profiles:
      - run
    working_dir: /app
    depends_on:
      nexus-1:
        condition: service_healthy
      nexus-2:
        condition: service_healthy
      sse-mock:
        condition: service_healthy
    entrypoint: []
    # Run as root so /var/run/docker.sock (mounted from host) is
    # readable regardless of which gid the host's docker group uses.
    # On the local Linux Docker Desktop the socket happens to be gid=999
    # which collides with the image's nexus group — tests pass. On
    # GitHub Actions the host gid differs and `pytest.skip()` fires for
    # every test that calls `docker.from_env()` or `container.exec_run`
    # (Docker SDK based: TestLeaderFailover, TestFullFailoverRecovery,
    # TestPartialReplicationFailure, TestZoneSnapshotExportImport, all 4
    # CLI surface tests). Running the test runner as root sidesteps the
    # host-gid mismatch — same effect every developer's `sudo docker`
    # has, scoped to a throwaway container.
    user: "0:0"
    volumes:
      - ..:/app
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app/src
      # Suppress pytest cache warnings — the /app volume is owned by
      # the host user and read-write only for them; pytest tries to
      # write `.pytest_cache/` there and noisily warns. Point cache
      # under /tmp inside the container instead.
      PYTEST_ADDOPTS: "-o cache_dir=/tmp/.pytest_cache"
    command: >
      bash -c '
        set -e
        # Test deps that are MISSING from the production
        # nexus-fullnode image. Already-present (httpx, grpcio,
        # docker, google.protobuf, click) are NOT reinstalled —
        # cuts ~25-30s off cold runs vs the prior superset list.
        # Keep pytest-timeout out of this runtime install: pyproject
        # intentionally avoids per-test timeouts, and making the plugin
        # mandatory has made this Docker-only job fail on PyPI resolver
        # edge cases before tests even start.
        echo "Installing missing test dependencies..."
        python -m pip install --retries 10 --timeout 60 -q \
          --index-url "${PIP_INDEX_URL:-https://pypi.org/simple}" \
          pytest pytest-asyncio
        echo "Running dynamic federation E2E tests..."
        # Glob, not a single file: any future `test_federation_*.py`
        # in the same dir is auto-picked up by both local invocation
        # and the CI workflow (.github/workflows/federation-e2e.yml)
        # without further config. Non-federation docker E2E (sandbox
        # perf/security, validation) keep their own files + workflows.
        timeout "${PYTEST_PROCESS_TIMEOUT:-30m}" \
          python -m pytest tests/e2e/docker/test_federation*.py -v --no-header -o "addopts="
      '
    networks:
      - dyn-nexus-network

networks:
  dyn-nexus-network:
    name: nexus_dyn-nexus-network
    driver: bridge

volumes:
  dyn_nexus1_data:
    name: nexus-dyn-node1-data
  dyn_nexus2_data:
    name: nexus-dyn-node2-data
  dyn_witness_data:
    name: nexus-dyn-witness-data
  dyn_dragonfly_data:
    name: nexus-dyn-dragonfly-data
