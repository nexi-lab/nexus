schema_version: 1
modules:
- id: access_manifest
  name: Access manifest
  description: Pre-computed access decisions for fast path checks.
  layer: brick
  depends_on:
  - nexus_fs
  - rebac
- id: agent_log
  name: Agent log
  description: Append-only agent activity log.
  layer: brick
  depends_on:
  - nexus_fs
- id: approvals
  name: Approvals
  description: Workflow approval gates.
  layer: brick
  depends_on:
  - rebac
  - workflows
- id: archive
  name: Archive
  description: Signed zone snapshots / archives.
  layer: brick
  depends_on:
  - snapshot
  - nexus_fs
- id: auth
  name: Auth
  description: OAuth providers + identity tokens.
  layer: brick
  depends_on: []
- id: auth_middleware
  name: Auth middleware
  description: JWT extraction, OperationContext population.
  layer: cross
  depends_on:
  - auth
- id: catalog
  name: Catalog
  description: Schema extraction (CSV/JSON/Parquet).
  layer: brick
  depends_on:
  - nexus_fs
  - parsers
- id: cli
  name: CLI
  description: nexus command-line interface, lazy command registry.
  layer: transport
  depends_on: []
- id: context_manifest
  name: Context manifest
  description: Deterministic pre-execution context.
  layer: brick
  depends_on:
  - nexus_fs
- id: daemon
  name: Daemon
  description: Long-running process model. nexus daemon up/status/enroll/refresh.
  layer: deployment
  depends_on: []
- id: delegation
  name: Delegation
  description: Agent identity delegation modes.
  layer: brick
  depends_on:
  - identity
- id: discovery
  name: Discovery
  description: BM25-based tool / surface discovery.
  layer: brick
  depends_on:
  - search
- id: federation
  name: Federation
  description: 'Cross-zone protocol: zone create/join/share/mount/list/export/import.'
  layer: deployment
  depends_on:
  - zone
  - rebac
- id: filesystem
  name: Filesystem brick
  description: Path-scoping wrappers for NexusFS.
  layer: brick
  depends_on:
  - nexus_fs
- id: fuse
  name: FUSE
  description: Mounts Nexus as a POSIX filesystem via the nexus-fuse Rust binary. Userspace processes read/write paths as
    if they were on a local disk.
  layer: transport
  depends_on:
  - nexus_fs
- id: governance
  name: Governance
  description: Anti-fraud, policy enforcement.
  layer: brick
  depends_on:
  - rebac
  - agent_log
- id: grpc
  name: gRPC
  description: 'NexusVFSService: generic Call dispatch + typed Read/Write/Delete.'
  layer: transport
  depends_on: []
- id: http
  name: HTTP
  description: FastAPI routers under server/api/. Per-feature route groups.
  layer: transport
  depends_on: []
- id: hub
  name: Hub
  description: Shared Nexus instance that other nodes connect to. Manages multi-tenant zones + admin RPCs.
  layer: deployment
  depends_on: []
- id: identity
  name: Identity
  description: Identity resolution + subject mapping.
  layer: brick
  depends_on: []
- id: mcp
  name: MCP
  description: Model Context Protocol tools and provider registry.
  layer: brick
  depends_on:
  - nexus_fs
  - rebac
- id: mcp_transport
  name: MCP transport
  description: MCP server endpoint wrapping the mcp brick's provider registry.
  layer: transport
  depends_on:
  - mcp
- id: mount
  name: Mount
  description: Backend mount lifecycle + driver registration.
  layer: brick
  depends_on:
  - nexus_fs
- id: nexus_fs
  name: NexusFS
  description: 'Python mixin stack: Content/Dispatch/Metadata/Watch. Calls Rust kernel.'
  layer: nexus_fs
  depends_on:
  - rust_kernel
- id: parsers
  name: Parsers
  description: Content parsers (code, docs, structured data).
  layer: brick
  depends_on: []
- id: pay
  name: Pay
  description: NexusPay credits + X402 payment rails.
  layer: brick
  depends_on: []
- id: portability
  name: Portability
  description: Data export/import bundles.
  layer: brick
  depends_on:
  - nexus_fs
- id: profile_gates
  name: Profile gates
  description: DeploymentProfile-based brick enable/disable.
  layer: cross
  depends_on: []
- id: raft
  name: Raft consensus
  description: Zone consensus for HA clusters (cluster profile).
  layer: deployment
  depends_on:
  - zone
- id: rebac
  name: ReBAC
  description: Zanzibar-style relation-based access control.
  layer: brick
  depends_on: []
- id: rust_kernel
  name: Rust kernel
  description: Mounts, metadata store, cache store. PyO3 FFI surface.
  layer: rust_kernel
  depends_on: []
- id: sandbox
  name: Sandbox
  description: Docker/E2B/Monty code execution.
  layer: brick
  depends_on: []
- id: sdk
  name: SDK
  description: Python remote clients (RPCProxyBase + domain clients).
  layer: transport
  depends_on: []
- id: search
  name: Search
  description: Zoekt / BM25 / semantic search daemon.
  layer: brick
  depends_on: []
- id: secrets
  name: Secrets
  description: Encrypted vault for credentials.
  layer: brick
  depends_on: []
- id: share_link
  name: Share Link
  description: Public/scoped share URLs for paths.
  layer: brick
  depends_on:
  - rebac
- id: snapshot
  name: Snapshot
  description: Transactional filesystem snapshots.
  layer: brick
  depends_on:
  - nexus_fs
- id: task_manager
  name: Task manager
  description: Async task scheduling + tracking.
  layer: brick
  depends_on: []
- id: upload
  name: Upload
  description: TUS / chunked upload handling.
  layer: brick
  depends_on:
  - nexus_fs
- id: versioning
  name: Versioning
  description: File history + revert.
  layer: brick
  depends_on:
  - nexus_fs
- id: workflows
  name: Workflows
  description: Event-driven workflow engine.
  layer: brick
  depends_on:
  - task_manager
- id: workspace
  name: Workspace
  description: Multi-workspace isolation + federation.
  layer: brick
  depends_on:
  - nexus_fs
  - rebac
- id: zone
  name: Zone
  description: Basic unit of multi-tenancy. Workspaces and bricks scope by zone.
  layer: deployment
  depends_on: []
