// A2A (Agent-to-Agent) gRPC transport binding.
//
// Nexus-specific proto, semantically equivalent to the official A2A v1.0
// specification but without google/api/annotations.proto (REST-specific).
// Provides ~50x throughput improvement over HTTP+JSON-RPC transport.

syntax = "proto3";

package nexus.a2a;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// === Service ===

// A2AService provides the gRPC transport binding for the A2A protocol.
//
// All RPCs are semantically equivalent to their JSON-RPC counterparts
// (tasks/send, tasks/sendSubscribe, tasks/get, tasks/cancel, tasks/resubscribe).
service A2AService {
  // SendMessage creates or continues a task with a user message.
  // Equivalent to JSON-RPC method "tasks/send".
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);

  // SendStreamingMessage creates or continues a task, returning a stream
  // of status and artifact updates.
  // Equivalent to JSON-RPC method "tasks/sendSubscribe".
  rpc SendStreamingMessage(SendMessageRequest) returns (stream StreamResponse);

  // GetTask retrieves a task by ID.
  // Equivalent to JSON-RPC method "tasks/get".
  rpc GetTask(GetTaskRequest) returns (Task);

  // CancelTask transitions a task to the CANCELED state.
  // Equivalent to JSON-RPC method "tasks/cancel".
  rpc CancelTask(CancelTaskRequest) returns (Task);

  // SubscribeToTask subscribes to updates for an existing task.
  // Equivalent to JSON-RPC method "tasks/resubscribe".
  rpc SubscribeToTask(SubscribeToTaskRequest) returns (stream StreamResponse);
}

// === Enums ===

// TaskState represents the lifecycle states of an A2A task.
enum TaskState {
  TASK_STATE_UNSPECIFIED = 0;
  TASK_STATE_SUBMITTED = 1;
  TASK_STATE_WORKING = 2;
  TASK_STATE_INPUT_REQUIRED = 3;
  TASK_STATE_COMPLETED = 4;
  TASK_STATE_FAILED = 5;
  TASK_STATE_CANCELED = 6;
  TASK_STATE_REJECTED = 7;
}

// === Core Messages ===

// Part represents a content part within a message or artifact.
// Uses oneof to discriminate between text, file, and data content.
message Part {
  oneof content {
    // Plain text content.
    string text = 1;
    // Structured JSON data (maps to DataPart).
    google.protobuf.Value data = 2;
    // Inline file bytes (maps to FilePart with bytes).
    bytes raw = 3;
    // File URL reference (maps to FilePart with url).
    string url = 4;
  }
  // File name (only for raw/url file parts).
  string filename = 5;
  // MIME type (only for raw/url file parts).
  string media_type = 6;
  // Optional part-level metadata.
  google.protobuf.Struct metadata = 7;
}

// Message represents a message exchanged between client and agent.
message Message {
  // Role: "user" or "agent".
  string role = 1;
  // Content parts.
  repeated Part parts = 2;
  // Optional message-level metadata.
  google.protobuf.Struct metadata = 3;
}

// Artifact represents an output artifact produced by the agent.
message Artifact {
  string artifact_id = 1;
  string name = 2;
  string description = 3;
  repeated Part parts = 4;
  google.protobuf.Struct metadata = 5;
}

// TaskStatus represents the current status of a task.
message TaskStatus {
  TaskState state = 1;
  Message message = 2;
  google.protobuf.Timestamp timestamp = 3;
}

// Task represents an A2A task.
message Task {
  string id = 1;
  string context_id = 2;
  TaskStatus status = 3;
  repeated Artifact artifacts = 4;
  repeated Message history = 5;
  google.protobuf.Struct metadata = 6;
}

// === Streaming Events ===

// TaskStatusUpdateEvent is emitted when a task's status changes.
message TaskStatusUpdateEvent {
  string task_id = 1;
  TaskStatus status = 2;
  bool final = 3;
}

// TaskArtifactUpdateEvent is emitted when an artifact is added or updated.
message TaskArtifactUpdateEvent {
  string task_id = 1;
  Artifact artifact = 2;
  bool append = 3;
}

// StreamResponse is the union type for server-streaming RPCs.
message StreamResponse {
  oneof response {
    Task task = 1;
    TaskStatusUpdateEvent status_update = 2;
    TaskArtifactUpdateEvent artifact_update = 3;
  }
}

// === Request/Response Messages ===

// SendMessageConfiguration holds optional configuration for message sending.
message SendMessageConfiguration {
  // Maximum number of history messages to return.
  int32 history_length = 1;
}

// SendMessageRequest is the request for SendMessage and SendStreamingMessage.
message SendMessageRequest {
  Message message = 1;
  SendMessageConfiguration configuration = 2;
  google.protobuf.Struct metadata = 3;
}

// SendMessageResponse wraps the Task returned by SendMessage.
message SendMessageResponse {
  Task task = 1;
}

// GetTaskRequest is the request for GetTask.
message GetTaskRequest {
  string id = 1;
  int32 history_length = 2;
}

// CancelTaskRequest is the request for CancelTask.
message CancelTaskRequest {
  string id = 1;
}

// SubscribeToTaskRequest is the request for SubscribeToTask.
message SubscribeToTaskRequest {
  string id = 1;
}
