// FileMetadata - shared metadata message used across Nexus.
//
// This is the canonical protobuf definition for file metadata,
// used by both the Python gRPC layer and the Rust Raft state machine.
//
// SSOT: This file is the single source of truth for FileMetadata serialization.

syntax = "proto3";

package nexus.core;

// Directory entry type — classifies what a path represents.
// Mirrors POSIX d_type but for the Nexus virtual filesystem.
enum DirEntryType {
  DT_REG = 0;     // Regular file (proto3 default)
  DT_DIR = 1;     // Directory
  DT_MOUNT = 2;   // Mount point (VFS namespace composition)
  DT_PIPE = 3;    // Kernel IPC ring buffer (same-node, SPSC)
  DT_STREAM = 4;  // Append-only log with offset-based non-destructive reads
  DT_EXTERNAL_STORAGE = 5;  // Backend-managed content (OAuth/API/CLI connectors)
}

// FileMetadata represents the metadata for a single file or directory in Nexus.
//
// All string fields use empty string as the default/absent value.
// Timestamps are stored as ISO 8601 strings for cross-language compatibility.
message FileMetadata {
  // Virtual path in the Nexus filesystem (e.g., "/docs/README.md").
  // Authoritative key — backends derive any storage-specific key
  // (relative-to-mount path, hash, etc.) from `path` + the local mount config.
  string path = 1;

  // File size in bytes.
  int64 size = 4;

  // Content hash / ETag for CAS deduplication.
  string etag = 5;

  // MIME type of the file (e.g., "text/plain").
  string mime_type = 6;

  // Creation timestamp (ISO 8601 string).
  string created_at = 7;

  // Last modification timestamp (ISO 8601 string).
  string modified_at = 8;

  // Metadata version number (starts at 1).
  int32 version = 9;

  // Kernel namespace partition ID for multi-zone isolation (P0 invariant).
  // Analogous to Linux sb->s_dev. Federation extends zones with Raft consensus.
  string zone_id = 10;

  reserved 11;
  reserved "created_by";

  // Kernel posix_uid for O(1) DAC via PermissionEnforcerProtocol.check_owner().
  string owner_id = 12;

  // Entry type: DT_REG (0), DT_DIR (1), DT_MOUNT (2), DT_PIPE (3), DT_STREAM (4).
  // SSOT for file/directory/mount/ipc distinction.
  DirEntryType entry_type = 13;

  // Mount target namespace (DT_MOUNT only). Kernel concept for cross-zone
  // path resolution — federation extends with Raft consensus per zone.
  string target_zone_id = 14;

  // TTL in seconds for ephemeral content (0 or unset = permanent).
  // Routes to TTL-bucketed volumes for zero-cost expiry (Issue #3405).
  double ttl_seconds = 15;

  // `host:port` of the node that performed the most recent write of this
  // content (overwritten on every successful write). Pure descriptive
  // metadata — the kernel does not interpret it. Higher layers (e.g.
  // federation) compare against the local node address to decide "did I
  // write this, or did someone else?" and route content fetches
  // accordingly. Empty / unset on single-node deployments where no node
  // identity has been published.
  string last_writer_address = 16;
}
