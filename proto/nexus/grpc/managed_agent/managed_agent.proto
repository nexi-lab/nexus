// sudo-code session lifecycle gRPC service.
//
// Surface is intentionally narrow: spawn, cancel, liveness. sudo-code
// runs as a subprocess driven by `nexus.services.acp.AcpService` (same
// shape claude / codex / codebuddy / nanobot already use), and prompt
// + event flow uses the existing chat-with-me VFS surface
// (`/agents/{name}/chat-with-me` and `/agents/human-{user}/chat-with-me`)
// over `NexusVFSService.{Read,Write}` + `sys_watch`. There is no
// SendPrompt / SubscribeEvents RPC here — that would duplicate the A2A
// primitive every other agent already uses (see the sudowork
// integration design `docs/tech/nexus-integration-architecture.md` §3).
//
// Session abstraction: one running sudo-code subprocess (one pid in
// AgentRegistry, one stdio-bound process). session_id and agent_id are
// allocated by nexusd at StartSession time so callers do not race on
// identity.

syntax = "proto3";

package nexus.grpc.sudo_code;

service SudoCodeService {
  // Spawn a new sudo-code session. nexusd allocates an agent_id via
  // AgentRegistry.spawn (callers do NOT supply one — keeps a single
  // authority over identity), constructs /proc/{pid}/workspace/ with
  // OS-level symlinks for each requested repo, plants the DT_LINK
  // shortcut at /proc/{pid}/workspace/chat-with-me, then delegates to
  // AcpService.call_agent which spawns `scode serve` as a subprocess
  // and binds its stdio to /proc/{pid}/fd/{0,1,2}.
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);

  // Cancel an in-flight turn or terminate the whole session.
  //   CANCEL_MODE_CANCEL_TURN    — abort the current generation, keep
  //                                the subprocess alive
  //   CANCEL_MODE_CANCEL_SESSION — terminate the subprocess, unregister
  //                                the agent from AgentRegistry
  rpc Cancel(CancelRequest) returns (CancelResponse);

  // Liveness / state snapshot. Cheap read — pulls AgentTable state +
  // workspace path. For live message flow use sys_watch over the
  // chat-with-me path; this RPC is only for "is the session still
  // alive, what state is it in" checks.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
}

// ── Session lifecycle ──────────────────────────────────────────────

message StartSessionRequest {
  // Stable agent name registered under /agents/{name}/. Examples:
  // "scode-standard", "scode-fast". Required.
  string agent = 1;

  // Repo specs that nexusd materializes as OS-level symlinks under
  // /proc/{pid}/workspace/{alias}. Empty = no symlinks (sudo-code
  // operates on the VFS workspace root only).
  repeated WorkspaceRepo repos = 2;

  // Optional model override — falls back to /agents/{agent}/config.toml
  // when empty.
  string model = 3;
}

message WorkspaceRepo {
  // Path on the host filesystem to symlink into the workspace. Absolute
  // host path; nexusd validates it exists at session-start time.
  string host_path = 1;

  // Name under which the symlink appears in /proc/{pid}/workspace/.
  // Empty = derive from the host path's basename.
  string alias = 2;
}

message StartSessionResponse {
  string session_id = 1;
  // pid in the AgentRegistry — `/proc/{pid}/` is the runtime namespace.
  string agent_id = 2;
  // Resolved workspace root: /proc/{pid}/workspace/.
  string workspace_path = 3;
}

// ── Cancel ─────────────────────────────────────────────────────────

message CancelRequest {
  string session_id = 1;
  CancelMode mode = 2;

  enum CancelMode {
    CANCEL_MODE_UNSPECIFIED = 0;
    CANCEL_MODE_CANCEL_TURN = 1;
    CANCEL_MODE_CANCEL_SESSION = 2;
  }
}

message CancelResponse {
  bool cancelled = 1;
}

// ── Liveness snapshot ──────────────────────────────────────────────

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  string session_id = 1;
  string agent_id = 2;
  string agent = 3;
  string workspace_path = 4;
  string model = 5;
  // AgentState from contracts/process_types.py, lower-cased — same
  // surface the kernel agent_wait syscall accepts.
  string state = 6;
}
