syntax = "proto3";

package nexus.storage;

// ObjectStore service — gRPC adapter for Python ObjectStoreABC backends.
//
// Rust kernel calls this service instead of crossing GIL via PyObjectStoreAdapter.
// Python ConnectorGrpcServer wraps any ObjectStoreABC as this service.
//
// Benefit: GIL freed during remote I/O (GDrive, Gmail, Slack, S3, GCS).
// Other syscalls (local read/write) proceed without GIL contention.

service ObjectStoreService {
  rpc ReadContent(ReadContentRequest) returns (ReadContentResponse);
  rpc WriteContent(WriteContentRequest) returns (WriteContentResponse);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
  rpc Mkdir(MkdirRequest) returns (MkdirResponse);
  rpc Rmdir(RmdirRequest) returns (RmdirResponse);
  rpc Rename(RenameRequest) returns (RenameResponse);
}

message ReadContentRequest {
  string content_id = 1;
  string backend_path = 2;
  // OperationContext fields (flattened for simplicity)
  string user_id = 10;
  string zone_id = 11;
  bool is_admin = 12;
}

message ReadContentResponse {
  bytes data = 1;
}

message WriteContentRequest {
  bytes content = 1;
  string content_id = 2;
  string user_id = 10;
  string zone_id = 11;
  bool is_admin = 12;
}

message WriteContentResponse {
  string content_id = 1;
  string version = 2;
  uint64 size = 3;
}

message DeleteFileRequest {
  string path = 1;
}

message DeleteFileResponse {}

message MkdirRequest {
  string path = 1;
  bool parents = 2;
  bool exist_ok = 3;
}

message MkdirResponse {}

message RmdirRequest {
  string path = 1;
  bool recursive = 2;
}

message RmdirResponse {}

message RenameRequest {
  string old_path = 1;
  string new_path = 2;
}

message RenameResponse {}
