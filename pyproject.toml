[project.urls]
Homepage = "https://github.com/nexi-lab/nexus"
Documentation = "https://nexi-lab.github.io/nexus/"
Repository = "https://github.com/nexi-lab/nexus"
Issues = "https://github.com/nexi-lab/nexus/issues"

[project.scripts]
nexus = "nexus.cli:main"
nexusd = "nexus.daemon:main"
nexus-extensions-index = "nexus.extensions.index:_cli_entry"

[build-system]
requires = ["setuptools>=82.0.1", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"nexus.cli" = ["data/*.yml", "data/*.Dockerfile", "data/*.sql"]
"nexus.backends.connectors.gws" = ["configs/*.yaml"]
"nexus.backends.connectors.github" = ["*.yaml"]
"nexus.bricks.auth.daemon.templates" = ["*.plist.j2", "*.service.j2"]
"nexus.extensions._index" = ["extensions.json"]

[tool.pytest.ini_options]
minversion = "7.0"
# No per-test timeout: CI runners have variable load; timeouts cause flaky failures
# and mask real issues (slow tests should be profiled and optimized, not killed).
addopts = [
    "-ra",
    "-q",
    "--strict-markers",
    "--strict-config",
    "-n", "auto",                 # Parallel execution (auto-detect CPU cores)
    "--dist", "loadgroup",        # Group tests by xdist_group marker for serial execution
    "--ignore=tests/evaluation",  # Exclude LLM evaluation tests from default runs
    "--ignore=tests/benchmarks",  # Exclude benchmarks from default runs (run via benchmark.yml)
]
# Coverage disabled by default for faster local runs. Enable in CI:
#   pytest --cov=nexus --cov-report=term-missing --cov-report=html --cov-report=xml
testpaths = ["tests"]
pythonpath = ["tests"]
asyncio_mode = "auto"
log_cli = false
log_cli_level = "WARNING"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
filterwarnings = [
    "ignore:Importing .* from nexus\\.services\\..* is deprecated:DeprecationWarning",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "e2e: marks tests as end-to-end tests",
    "benchmark: marks tests as benchmarks",
    "evaluation: marks tests as LLM evaluation tests (requires ANTHROPIC_API_KEY)",
    "quarantine: Tests that are flaky or timing-dependent (deselected by default in CI)",
    "postgres: marks tests that require a running PostgreSQL instance (Issue #1299)",
    "benchmark_ci: critical benchmarks run on every PR",
    "vault: marks tests that require a running Vault dev server (opt-in, see docs/guides/auth-envelope-encryption.md)",
    "kms: marks tests that require a reachable AWS KMS endpoint (opt-in, real AWS or LocalStack)",
    "sandbox_memory: SANDBOX memory benchmark (skipped by default; run with -m sandbox_memory)",
    "demo_memory: nexusd demo profile RSS regression (slow, requires Docker; Issue #3997)",
]

[tool.coverage.run]
source = ["src/nexus"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/site-packages/*",
    "*/cli.py",  # Old location (kept for backward compatibility)
    "src/nexus/cli/*",  # CLI is tested via integration tests in examples/test_cli_commands.sh
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
    "@abstractmethod",
    "@abc.abstractmethod",
]

[tool.mypy]
# Type checking configuration - Phase 3 will enable full strict mode
python_version = "3.14"
mypy_path = "stubs"
exclude = [
    "_pb2(_grpc)?\\.py$",  # Generated gRPC/protobuf stubs
]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true  # Phase 3: Will fix all 531 type: ignore comments
warn_no_return = true
follow_imports = "normal"
ignore_missing_imports = true  # Phase 3: Will remove and add proper stubs
strict_optional = true
strict_equality = true
show_error_codes = true
show_column_numbers = true
pretty = true

# Phase 3 goals (currently have 531 type: ignore comments to eliminate):
# - disallow_any_generics = true
# - disallow_any_unimported = true
# - disallow_subclassing_any = true
# - strict = true

[[tool.mypy.overrides]]
module = [
    "click.*",
    "rich.*",
    "alembic.*",
    "google.cloud.*",
    "yaml",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "nexus.storage._metadata_mapper_generated"
# Proto-generated metadata_pb2 resolves to Any without a generated stub
disable_error_code = ["attr-defined"]

[[tool.mypy.overrides]]
module = "nexus.backends.gcs"
# Legacy backend - return-type / override mismatches
disable_error_code = ["attr-defined", "override", "return-value"]

[[tool.mypy.overrides]]
module = "nexus.backends.gcs_connector"
# Return-type mismatch in connector methods
disable_error_code = ["attr-defined", "return-value"]

[[tool.mypy.overrides]]
module = "nexus.backends.transports.gcs_transport"
# google-cloud-storage stubs return Any; attr-defined from google.cloud.storage
disable_error_code = ["attr-defined", "no-any-return"]

[[tool.mypy.overrides]]
module = "nexus.backends.transports.s3_transport"
# boto3 stubs return Any for all S3 client methods
disable_error_code = ["no-any-return"]

[[tool.mypy.overrides]]
module = "nexus.backends.cas_backend"
# json.loads returns Any
disable_error_code = ["no-any-return"]

[[tool.mypy.overrides]]
module = "nexus.tools.langgraph.nexus_tools"
# RemoteServiceProxy dispatches via __getattr__, returning Any
warn_return_any = false
disable_error_code = ["no-any-return"]

[[tool.mypy.overrides]]
module = "nexus.bricks.*.tests.*"
# Brick-internal test files (moved from tests/ to src/nexus/bricks/*/tests/).
# Relax strict typing for test code — fixture parameters are injected by pytest
# and don't need type annotations.
disallow_untyped_defs = false
disallow_incomplete_defs = false

[[tool.mypy.overrides]]
module = ["tests.testkit", "tests.testkit.*"]
# Test helper modules can be followed by mypy when brick-internal tests import
# them from under src/nexus. Keep them out of production strictness.
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_return_any = false
disable_error_code = ["attr-defined", "func-returns-value", "override", "return-value"]

[[tool.mypy.overrides]]
module = "nexus.backends.delegating"
# DelegatingBackend delegates all Backend methods to _inner via explicit forwarding.
# mypy resolves _inner.method() return types as Any when Backend is imported under
# TYPE_CHECKING (Issue #1449 recursive wrapping).
warn_return_any = false

[[tool.mypy.overrides]]
module = "nexus.backends.s3_connector"
# Return-type mismatch in connector methods
disable_error_code = ["attr-defined", "return-value"]

[[tool.mypy.overrides]]
module = "nexus.backends.local"
# Return-type mismatch in backend methods
disable_error_code = ["return-value"]

[[tool.mypy.overrides]]
module = "nexus.backends.hn_connector"
# Return-type mismatch in connector methods
disable_error_code = ["return-value"]

[[tool.mypy.overrides]]
module = "nexus.backends.gdrive_connector"
# Return-type mismatch in connector methods
disable_error_code = ["return-value"]


[[tool.mypy.overrides]]
module = "nexus.bricks.watch.file_watcher"
# watchfiles returns Change enum values that mypy resolves as int
disable_error_code = ["no-any-return"]

[[tool.mypy.overrides]]
module = "nexus.backends.gmail_connector"
# Legacy backend - return-type / override mismatches
disable_error_code = ["override", "return-value", "no-any-return", "import-untyped", "unused-ignore"]

[[tool.mypy.overrides]]
module = "nexus.backends.x_connector"
# Legacy backend - return-type / override mismatches
disable_error_code = ["override", "return-value"]

[[tool.mypy.overrides]]
module = "nexus.backends.slack_connector"
# Backend - return-type / override mismatches
