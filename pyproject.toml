    "litellm>=1.83.0",
    "openai>=2.36.0",
    "e2b-code-interpreter>=2.6.2",
    "uvicorn[standard]>=0.46.0",
    "boto3>=1.43.6",
    "google-cloud-storage>=3.10.1",
    "google-api-python-client>=2.196.0",
    "google-auth>=2.52.0",
    "google-auth-httplib2>=0.4.0",
    "google-auth-oauthlib>=1.4.0",
