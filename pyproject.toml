[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    "benchmarks/",
    "src/nexus/core/_metadata_generated.py",  # Generated at install time
    "src/nexus/core/_compact_generated.py",    # Generated at install time
    "src/nexus/core/protocols/",               # Generated at install time
    "src/nexus/grpc/vfs/vfs_pb2.py",           # Generated gRPC stub
    "src/nexus/grpc/vfs/vfs_pb2_grpc.py",      # Generated gRPC stub
    "src/nexus/grpc/approvals/approvals_pb2.py",       # Generated gRPC stub
    "src/nexus/grpc/approvals/approvals_pb2_grpc.py",  # Generated gRPC stub
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ARG", # flake8-unused-arguments
    "SIM", # flake8-simplify
    "G",   # flake8-logging-format (Issue #1002: prevent f-string in log calls)
]
ignore = [
    "E501",  # line too long, handled by formatter
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
    "UP037",  # quoted-annotation — needed for TYPE_CHECKING imports & forward refs (#1526)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["ARG", "S101", "B905", "SIM105", "G"]  # Tests: allow unused args, assert, zip, suppress, log format
"src/nexus/**/*.py" = ["G003", "G004", "G201"]  # Issue #1002: existing string concat + f-string + exc_info log calls — migrate gradually
"scripts/**/*.py" = ["G"]  # Scripts: allow all log format variants
"dockerfiles/**/*.py" = ["G"]  # Dockerfiles: allow all log format variants
"tests/e2e/self_contained/test_raft_metadata_store.py" = ["ARG", "S101", "B905", "F841"]  # zip strict, unused vars
"tests/e2e/self_contained/mcp/test_mcp_server_integration.py" = ["ARG", "S101", "B904"]  # raise from
"alembic/*" = ["UP007", "E402"]  # Alembic: Union syntax, import order
"src/nexus/backends/*.py" = ["ARG002"]  # Keep unused context params for API compatibility
"src/nexus/cache/postgres.py" = ["ARG002"]  # No-op stub implements PermissionCacheProtocol interface
"src/nexus/bricks/rebac/manager.py" = ["ARG002"]  # No-op cache stubs keep interface for callers
"src/nexus/ipc/driver.py" = ["ARG002"]  # Backend ABC override — context params required by interface
"src/nexus/core/nexus_fs.py" = ["ARG002"]  # Constructor accepts cache params for public API
"src/nexus/raft/__init__.py" = ["E402"]  # Conditional imports require try/except after TYPE_CHECKING
"src/nexus/server/rpc/handlers/filesystem.py" = ["ARG001"]  # Handler signature requires context param
"src/nexus/storage/raft_metadata_store.py" = ["ARG002", "SIM105", "SIM108", "SIM102"]  # Interface + datetime parsing + style
"src/nexus/services/activity/emitter.py" = ["ARG002"]  # NoopEmitter discards all args — full typed signature required by Emitter Protocol
"scripts/*.py" = ["ARG001"]  # Utility scripts

[tool.ruff.lint.isort]
known-first-party = ["nexus"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# =============================================================================
# Import Linter — Architecture boundary enforcement (Issue #2286)
# Reference: docs/design/NEXUS-LEGO-ARCHITECTURE.md §1.2, §3.3
# =============================================================================

[tool.importlinter]
root_packages = ["nexus"]
# TYPE_CHECKING imports are violations too (strict mode)
include_external_packages = false

# Contract 1: Bricks are independent — zero cross-brick imports
[[tool.importlinter.contracts]]
id = "brick-independence"
name = "Bricks must not import from each other (LEGO Principle 3)"
type = "independence"
modules = [
    "nexus.bricks.access_manifest",
    "nexus.bricks.approvals",
    "nexus.bricks.archive",
    "nexus.bricks.auth",
    "nexus.bricks.catalog",
    "nexus.bricks.context_manifest",
    "nexus.bricks.delegation",
    "nexus.bricks.discovery",
    "nexus.bricks.filesystem",
    "nexus.bricks.governance",
    "nexus.bricks.identity",
    "nexus.bricks.mcp",
    "nexus.bricks.mount",
    "nexus.bricks.parsers",
    "nexus.bricks.pay",
    "nexus.bricks.portability",
    "nexus.bricks.rebac",
    "nexus.bricks.sandbox",
    "nexus.bricks.search",
    "nexus.bricks.secrets",
    "nexus.bricks.share_link",
    "nexus.bricks.snapshot",
    "nexus.bricks.task_manager",
    "nexus.bricks.upload",
    "nexus.bricks.versioning",
    "nexus.bricks.workflows",
    "nexus.bricks.workspace",
]
# Known violations — ratchet baseline. Remove entries as fixes land.
ignore_imports = [
    # (removed: memory -> search, search -> cache embeddings — now use importlib)
    # (removed: nexus.storage -> nexus.cache.protocols — both are non-brick pillar modules now)
    # cache -> rebac transitive chain (via nexus.server.telemetry, Issue #2179)
    "nexus.server.telemetry -> nexus.bricks.rebac.rebac_tracing",
    # mcp -> rebac: TYPE_CHECKING imports for middleware/profiles (Issue #2429)
    "nexus.bricks.mcp.middleware -> nexus.bricks.rebac.manager",
    "nexus.bricks.mcp.profiles -> nexus.bricks.rebac.manager",
    # search -> rebac: permission enforcement + entity registry in search_service (moved from services/)
    "nexus.bricks.search.search_service -> nexus.bricks.rebac.enforcer",
    "nexus.bricks.search.search_service -> nexus.bricks.rebac.manager",
    # parsers -> sandbox: TYPE_CHECKING imports for sandbox provider (Issue #2429)
    "nexus.bricks.parsers.validation.runner -> nexus.bricks.sandbox.sandbox_provider",
    "nexus.bricks.parsers.validation.detector -> nexus.bricks.sandbox.sandbox_provider",
    # portability -> * : export_service imports top-level nexus package (transitive hub, Issue #2436)
    "nexus.bricks.portability.export_service -> nexus",
    # mcp -> nexus: server.py imports top-level nexus package — same transitive hub pattern
    "nexus.bricks.mcp.server -> nexus",
    # Ratchet entries exposed by expanding the module list to all active bricks.
    "nexus.bricks.approvals.grpc_auth -> nexus.bricks.auth.types",
    "nexus.bricks.archive.cli_glue -> nexus.cli.utils",
    "nexus.bricks.archive.cli_glue -> nexus.bricks.portability.export_service",
    "nexus.bricks.archive.cli_glue -> nexus.bricks.portability.import_service",
    "nexus.bricks.archive.cli_glue -> nexus.bricks.portability.models",
    "nexus.bricks.archive.cli_glue -> nexus.bricks.portability.signer",
    "nexus.bricks.archive.cli_glue -> nexus.bricks.portability.trust",
    "nexus.bricks.archive.orchestrator -> nexus.bricks.portability.models",
    "nexus.bricks.archive.tests.unit.test_verify -> nexus.bricks.portability.signer",
    "nexus.bricks.archive.verify -> nexus.bricks.portability.signer",
    "nexus.bricks.mcp.connection_manager -> nexus.bricks.approvals.policy_gate",
    "nexus.bricks.mcp.mcp_service -> nexus.bricks.approvals.policy_gate",
    "nexus.bricks.mcp.mount -> nexus.bricks.approvals.models",
    "nexus.bricks.mcp.mount -> nexus.bricks.approvals.policy_gate",
    "nexus.bricks.mcp.server -> nexus.bricks.approvals.policy_gate",
    "nexus.bricks.portability.import_service -> nexus.bricks.archive.errors",
    "nexus.bricks.portability.signer -> nexus.bricks.archive.errors",
    "nexus.bricks.portability.tests.test_import_embedding -> nexus.bricks.archive.errors",
    "nexus.bricks.portability.tests.test_import_target_guard -> nexus.bricks.archive.errors",
    "nexus.bricks.portability.tests.test_signer -> nexus.bricks.archive.errors",
]
unmatched_ignore_imports_alerting = "warn"

# Contract 2: Five-tier layered architecture
# contracts (include/linux) < lib+security (lib/) < kernel (core) < services  bricks
# contracts is the type-definition base — everyone can depend on it.
# lib and security provide utilities that may use contract types, like Linux lib/ includes include/linux/.
# security is tier-neutral (TLS, TOFU, prompt sanitizer) — zero kernel/service/brick deps.
[[tool.importlinter.contracts]]
id = "four-tier-layers"
name = "Five-tier architecture: contracts < lib+security < kernel < services  bricks"
type = "layers"
layers = [
    "nexus.bricks",
    "nexus.services",
    "nexus.core",
    "nexus.lib | nexus.security",
    "nexus.contracts",
]
# Ratchet baseline — known violations. Remove entries as fixes land.
# Run: lint-imports --contract four-tier-layers to check.
ignore_imports = [
    # --- tier-neutral (contracts) importing core ---
    "nexus.contracts.metadata -> nexus.core._compact_generated",
    # --- tier-neutral (contracts/protocols) importing bricks ---
    # chunked_upload protocol TYPE_CHECKING import for UploadSession return type
    "nexus.contracts.protocols.chunked_upload -> nexus.bricks.upload.upload_session",
    # --- contracts importing lib (upward — legacy, to be fixed) ---
    "nexus.contracts.agent_utils -> nexus.storage.models",
    "nexus.contracts -> nexus.lib.validators",
    "nexus.contracts.deployment_profile -> nexus.lib.performance_tuning",
    "nexus.contracts.types -> nexus.storage.read_set",
    # WirableFS TYPE_CHECKING imports (cross-tier wiring contract, #2359)
    "nexus.contracts.wirable_fs -> nexus.storage.record_store",
    # --- lib importing services (upward — legacy, to be fixed) ---
    "nexus.lib.permission_utils -> nexus.services.gateway",
    # --- kernel (core) importing bricks ---
    "nexus.core.config -> nexus.bricks.workflows.protocol",
    # --- services importing bricks ---
    "nexus.services.workspace.workspace_rpc_service -> nexus.bricks.workspace.workspace_registry",
    "nexus.services.lifecycle.workflow_dispatch_service -> nexus.bricks.workflows.protocol",
    "nexus.services.namespace.agent_namespace -> nexus.bricks.rebac.namespace_manager",
    "nexus.services.namespace.namespace_fork_service -> nexus.bricks.rebac.namespace_manager",
    # search_semantic → factory._semantic_search → bricks (transitive chain)
    "nexus.factory._semantic_search -> nexus.bricks.search.chunking",
    "nexus.factory._semantic_search -> nexus.bricks.search.indexing",
    "nexus.factory._semantic_search -> nexus.bricks.search.indexing_service",
    "nexus.factory._semantic_search -> nexus.bricks.search.pipeline_indexer",
    # (removed: services.delegation/memory/governance → bricks entries; modules relocated to bricks/)
    # --- bricks importing non-layer modules ---
    # --- non-layer module chain hops ---
    "nexus.factory -> nexus.factory.orchestrator",
    "nexus.factory -> nexus.factory.wallet",
    "nexus.factory.wallet -> nexus.bricks.pay.constants",
    # (removed: nexus.services.sync.sync_service -> glob_fast; now uses importlib)
]
unmatched_ignore_imports_alerting = "warn"

# Contract 3: Explicit top-level package boundary coverage.
# This complements the layered contract above, which intentionally models the
# core tier names but does not enumerate every top-level package in src/nexus.
[[tool.importlinter.contracts]]
id = "top-level-packages-must-not-import-server"
name = "Non-server top-level packages must not import server"
type = "forbidden"
source_modules = [
    "nexus.backends",
    "nexus.contracts",
    "nexus.core",
    "nexus.factory",
    "nexus.fs",
    "nexus.lib",
    "nexus.remote",
    "nexus.security",
    "nexus.services",
    "nexus.storage",
]
forbidden_modules = ["nexus.server"]
allow_indirect_imports = true
# Known lazy direct imports used for optional server-side wiring/debug metadata.
# Remove entries as these dependencies move behind protocols.
ignore_imports = [
    "nexus.factory._system -> nexus.server.observability.observability_subsystem",
    "nexus.remote.rpc_proxy -> nexus.server._rpc_params_generated",
]
unmatched_ignore_imports_alerting = "warn"

[dependency-groups]
dev = [
    "freezegun>=1.5.5",
    "grpcio-tools>=1.80.0",
    "maturin-import-hook>=0.3.0",
    "mypy>=2.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "pytest-xdist>=3.8.0",
    "respx>=0.23.1",
    "types-aiofiles>=25.1.0.20260409",
    "types-protobuf>=7.34.1.20260503",
    "types-redis>=4.6.0.20241004",
]
