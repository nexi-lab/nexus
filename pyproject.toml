]

e2b = [
    # E2B cloud sandbox support (stateful Python execution via Jupyter kernel)
    "e2b-code-interpreter>=2.6.2",
]

docker = [
    # Docker sandbox provider (local containerized execution)
    "docker>=7.1.0",
]

