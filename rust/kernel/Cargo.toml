[package]
name = "kernel"
version = "0.9.33"
edition = "2021"

[lib]
name = "nexus_kernel"
crate-type = ["cdylib", "rlib"]  # cdylib for Python, rlib for Rust deps (e.g. raft::zone_metastore)

[dependencies]
contracts = { workspace = true }
library = { workspace = true }
# F2 C8 (Option A): raft rlib pulled in so kernel can impl Metastore over
# raft's ZoneConsensus directly, no cross-cdylib Rust trait object
# dispatch. See rust/kernel/src/raft_metastore.rs.
raft = { workspace = true }
pyo3 = { version = "0.27.2", features = ["extension-module", "hashbrown"] }
serde = { workspace = true }
serde_json = { workspace = true }
ahash = { workspace = true }
regex = { workspace = true }
memchr = { workspace = true }
globset = { workspace = true }
blake3 = { workspace = true }
fastcdc = { workspace = true }
string-interner = { workspace = true }
roaring = { workspace = true }
encoding_rs = "0.8.35"
rayon = "1.11"
bloomfilter = "3.0"
libc = "0.2"
memmap2 = "0.9.9"
tempfile = "3"
dashmap = "6.1"
parking_lot = "0.12"
redb = "2"
uuid = { version = "1", features = ["v4"] }
lru = "0.16"
simdutf8 = "0.1"
simsimd = "6"
crc32fast = { workspace = true }
transport = { workspace = true }
tonic = { workspace = true }
prost = { workspace = true }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "net", "sync", "time", "macros"] }
futures = "0.3"
tracing = "0.1"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"], default-features = false, optional = true }
hmac = { version = "0.12", optional = true }
sha2 = { version = "0.10", optional = true }
futures-util = { version = "0.3", default-features = false, optional = true }
chrono = { version = "0.4", default-features = false, features = ["std", "clock"] }
mimalloc = { workspace = true, optional = true }

[features]
default = ["mimalloc", "connectors", "py-hook-adapters"]
mimalloc = ["dep:mimalloc"]
connectors = ["dep:reqwest", "dep:hmac", "dep:sha2", "dep:futures-util"]
# §11 Phase 14: Python hook/resolver adapters. Enabled by default (POST hooks
# still use PyInterceptHookAdapter). Disable to compile out all Python-to-Rust
# adapter bridging — requires ALL hooks to be NativeInterceptHook impls.
py-hook-adapters = []

[build-dependencies]
tonic-build = "0.13"

[dev-dependencies]
criterion = "0.5"
rcgen = { version = "0.13", features = ["pem", "x509-parser"] }  # Self-signed CAs for federation_client tests
tempfile = "3"

[[bench]]
name = "prefix_bench"
harness = false
# §11 observer Rust-ification
