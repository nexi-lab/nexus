# Nexus Stack — Portable Compose File
# ====================================
# Bundled version for use outside the repo root.
# Builds Nexus from source with semantic-search support (txtai + pgvector).
# Services are activated via Docker Compose profiles:
#
#   Preset "shared":  --profile core --profile cache --profile search
#   Preset "demo":    --profile core --profile cache --profile search
#   Add-on "nats":    --profile events
#   Add-on "mcp":     --profile mcp
#
# Usage (via nexus CLI — recommended):
#   nexus init --preset shared && nexus up
#
# Issue #2915: https://github.com/nexi-lab/nexus/issues/2915

services:
  # ============================================================================
  # PostgreSQL Database (with pgvector for semantic search)
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    profiles:
      - core
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-wal-archive:/var/lib/postgresql/wal_archive
      - ${NEXUS_PGVECTOR_INIT_SQL:-./001-enable-pgvector.sql}:/docker-entrypoint-initdb.d/001-enable-pgvector.sql:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c effective_io_concurrency=16
      -c maintenance_io_concurrency=16
      -c wal_compression=lz4
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Nexus RPC Server (built from source with semantic-search)
  # ============================================================================
  nexus:
    build:
      context: ${NEXUS_BUILD_CONTEXT:-.}
      dockerfile: ${NEXUS_DOCKERFILE:-nexus-demo.Dockerfile}
    image: nexus-demo:latest
    restart: unless-stopped
    profiles:
      - core
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Server
      NEXUS_HOST: "0.0.0.0"
      NEXUS_PORT: "2026"
      NEXUS_DATA_DIR: /app/data
      NEXUS_PROFILE: full
      # Database
      NEXUS_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      # Auth
      NEXUS_AUTH_TYPE: ${NEXUS_AUTH_TYPE:-database}
      NEXUS_API_KEY: ${NEXUS_API_KEY:-}
      # Search
      NEXUS_SEARCH_DAEMON: "true"
      # Permissions
      NEXUS_SKIP_PERMISSIONS: ${NEXUS_SKIP_PERMISSIONS:-false}
      NEXUS_ENFORCE_PERMISSIONS: ${NEXUS_ENFORCE_PERMISSIONS:-true}
      NEXUS_ALLOW_ADMIN_BYPASS: ${NEXUS_ALLOW_ADMIN_BYPASS:-true}
      # Cache
      NEXUS_DRAGONFLY_URL: ${NEXUS_DRAGONFLY_URL:-redis://dragonfly:6379}
      NEXUS_CACHE_EMBEDDING_TTL: ${NEXUS_CACHE_EMBEDDING_TTL:-86400}
      # gRPC
      NEXUS_GRPC_PORT: "${NEXUS_GRPC_PORT:-2028}"
    volumes:
      - ${NEXUS_HOST_DATA_DIR:-./nexus-data}:/app/data
    ports:
      - "${NEXUS_PORT:-2026}:2026"
      - "${NEXUS_GRPC_PORT:-2028}:${NEXUS_GRPC_PORT:-2028}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2026/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # DragonflyDB — Hot Cache
  # ============================================================================
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    restart: unless-stopped
    profiles:
      - cache
    command: >
      --cache_mode=true
      --maxmemory=512mb
      --proactor_threads=2
    ports:
      - "${DRAGONFLY_PORT:-6379}:6379"
    volumes:
      - dragonfly-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Zoekt — Fast Code Search
  # ============================================================================
  zoekt:
    image: sourcegraph/zoekt-webserver:latest
    restart: unless-stopped
    profiles:
      - search
    environment:
      ZOEKT_INDEX_DIR: /index
      ZOEKT_DATA_DIR: /data
    volumes:
      - ${NEXUS_HOST_DATA_DIR:-./nexus-data}:/data
      - zoekt-index:/index
    ports:
      - "${ZOEKT_PORT:-6070}:6070"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6070/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # NATS JetStream — Durable Event Bus (optional add-on)
  # ============================================================================
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    profiles:
      - events
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    driver: local
  postgres-wal-archive:
    driver: local
  dragonfly-data:
    driver: local
  zoekt-index:
    driver: local
  nats-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  nexus-network:
    driver: bridge
