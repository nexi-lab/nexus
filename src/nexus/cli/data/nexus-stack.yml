# Nexus Stack — Portable Compose File
# ====================================
# Bundled version for use outside the repo root.
# Pulls the prebuilt Nexus image from GHCR — no local Docker build required.
# Services are activated via Docker Compose profiles:
#
#   Preset "shared":  --profile core --profile cache --profile search
#   Preset "demo":    --profile core --profile cache --profile search
#   Add-on "nats":    --profile events
#   Add-on "mcp":     --profile mcp
#
# Usage (via nexus CLI — recommended):
#   nexus init --preset shared && nexus up
#
# Issue #2915: https://github.com/nexi-lab/nexus/issues/2915

services:
  # ============================================================================
  # PostgreSQL Database (with pgvector for semantic search)
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    profiles:
      - core
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-wal-archive:/var/lib/postgresql/wal_archive
      - ${NEXUS_PGVECTOR_INIT_SQL:-./001-enable-pgvector.sql}:/docker-entrypoint-initdb.d/001-enable-pgvector.sql:ro
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c effective_io_concurrency=16
      -c maintenance_io_concurrency=16
      -c wal_compression=lz4
      -c shared_buffers=128MB
      -c effective_cache_size=3GB
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Nexus RPC Server (prebuilt image from GHCR)
  # ============================================================================
  nexus:
    image: ${NEXUS_IMAGE_REF:-ghcr.io/nexi-lab/nexus:latest}
    restart: unless-stopped
    profiles:
      - core
    depends_on:
      postgres:
        condition: service_healthy
      tigerbeetle:
        condition: service_started
    environment:
      # Server
      NEXUS_HOST: "0.0.0.0"
      NEXUS_PORT: "2026"
      NEXUS_DATA_DIR: /app/data
      # Database
      NEXUS_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
      # Auth
      NEXUS_ADMIN_USER: ${NEXUS_ADMIN_USER:-admin}
      NEXUS_AUTH_TYPE: ${NEXUS_AUTH_TYPE:-database}
      NEXUS_API_KEY: ${NEXUS_API_KEY:-}
      # Search
      NEXUS_SEARCH_DAEMON: "true"
      NEXUS_TXTAI_MODEL: ${NEXUS_TXTAI_MODEL:-}
      NEXUS_TXTAI_USE_API_EMBEDDINGS: ${NEXUS_TXTAI_USE_API_EMBEDDINGS:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      # Permissions
      NEXUS_SKIP_PERMISSIONS: ${NEXUS_SKIP_PERMISSIONS:-false}
      NEXUS_ENFORCE_PERMISSIONS: ${NEXUS_ENFORCE_PERMISSIONS:-true}
      NEXUS_ALLOW_ADMIN_BYPASS: ${NEXUS_ALLOW_ADMIN_BYPASS:-true}
      # Cache
      NEXUS_DRAGONFLY_URL: ${NEXUS_DRAGONFLY_URL:-redis://dragonfly:6379}
      NEXUS_CACHE_EMBEDDING_TTL: ${NEXUS_CACHE_EMBEDDING_TTL:-86400}
      # gRPC
      NEXUS_GRPC_PORT: "2028"  # Fixed inside container; host port varies via port mapping
      NEXUS_GRPC_TLS: ${NEXUS_GRPC_TLS:-false}
      NEXUS_GRPC_BIND_ALL: ${NEXUS_GRPC_BIND_ALL:-true}
      # 0.0.0.0 is a valid bind address but not a valid connect/advertise address.
      # Without this, NEXUS_ADVERTISE_ADDR defaults to 0.0.0.0 which fails the
      # gRPC insecure-channel loopback check when the kernel reconnects to itself.
      # Default to 127.0.0.1 for single-node; override for federation/cross-container.
      # NEXUS_GRPC_PORT is fixed at 2028 inside this container (host port varies via mapping).
      NEXUS_ADVERTISE_ADDR: ${NEXUS_ADVERTISE_ADDR:-127.0.0.1:2028}
      # TigerBeetle (Nexus Pay)
      TIGERBEETLE_ADDRESS: ${TIGERBEETLE_ADDRESS:-tigerbeetle:3000}
      NEXUS_PAY_ENABLED: ${NEXUS_PAY_ENABLED:-true}
    # TigerBeetle client needs io_uring (seccomp unconfined) + memory locking
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK
    volumes:
      - ${NEXUS_HOST_DATA_DIR:-./nexus-data}:/app/data
    ports:
      - "${NEXUS_PORT:-2026}:2026"
      - "${NEXUS_GRPC_PORT:-2028}:2028"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2026/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # TigerBeetle — Financial Ledger (Nexus Pay)
  # ============================================================================
  # Init service: formats data file on first run (idempotent — exits if already formatted)
  tigerbeetle-init:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    profiles:
      - core
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK
    command: ["format", "--cluster=0", "--replica=0", "--replica-count=1", "/data/0_0.tigerbeetle"]
    volumes:
      - tigerbeetle-data:/data
    networks:
      - nexus-network

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.78
    restart: unless-stopped
    profiles:
      - core
    depends_on:
      tigerbeetle-init:
        condition: service_completed_successfully
    # io_uring requires seccomp=unconfined on Docker Desktop / OrbStack (Issue #3250)
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK
    command: ["start", "--addresses=0.0.0.0:3000", "/data/0_0.tigerbeetle"]
    volumes:
      - tigerbeetle-data:/data
    ports:
      - "${TIGERBEETLE_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "echo ok"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # DragonflyDB — Hot Cache
  # ============================================================================
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    restart: unless-stopped
    profiles:
      - cache
    command: >
      --cache_mode=true
      --maxmemory=512mb
      --proactor_threads=2
    ports:
      - "${DRAGONFLY_PORT:-6379}:6379"
    volumes:
      - dragonfly-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # NATS JetStream — Durable Event Bus (optional add-on)
  # ============================================================================
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    profiles:
      - events
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - nexus-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    driver: local
  postgres-wal-archive:
    driver: local
  dragonfly-data:
    driver: local
  nats-data:
    driver: local
  tigerbeetle-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  nexus-network:
    driver: bridge
